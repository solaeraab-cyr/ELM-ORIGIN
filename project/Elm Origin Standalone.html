                <h3 className="font-heading" style={{ fontSize: 16, fontWeight: 600, marginBottom: 16 }}>Theme</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                  {[['Light','Soft & bright',false],['Dark','Midnight',false],['System','Follow OS',false]].map(([n,d], i) => {
                    const isActive = i === 0 ? !dark : i === 1 ? dark : false;
                    return (
                      <button key={n} onClick={() => {
                        if (i === 0 && window.useTheme) { /* handled by TopBar */ }
                        if (typeof window.setTheme === 'function') window.setTheme(i === 0 ? 'light' : i === 1 ? 'dark' : 'light');
                      }} className="card card-hover" style={{ padding: 14, textAlign: 'left', borderColor: isActive ? 'var(--text-primary)' : 'var(--border-subtle)' }}>
                        <div style={{ height: 56, borderRadius: 8, background: i === 0 ? 'linear-gradient(135deg, #FFFFFF, #F3F4F8)' : i === 1 ? 'linear-gradient(135deg, #0E1228, #232845)' : 'linear-gradient(90deg, #FFFFFF 50%, #0E1228 50%)', marginBottom: 10, border: '1px solid var(--border-subtle)' }}/>
                        <div className="font-heading" style={{ fontSize: 13, fontWeight: 600 }}>{n}</div>
                        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 2 }}>{d}</div>
                        {isActive && <div style={{ marginTop: 8, display: 'flex', alignItems: 'center', gap: 4, color: 'var(--mint-600)', fontSize: 12, fontWeight: 600 }}><Icon name="check" size={12}/> Active</div>}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div className="card" style={{ padding: 26 }}>
                <h3 className="font-heading" style={{ fontSize: 16, fontWeight: 600, marginBottom: 14 }}>Accessibility</h3>
                <ToggleRow title="Reduce motion" sub="Disables animations and transitions" defaultOn={false} last/>
              </div>
            </>
          )}
          {section === 'notifications' && (
            <div className="card" style={{ padding: 26 }}>
              <h3 className="font-heading" style={{ fontSize: 16, fontWeight: 600, marginBottom: 14 }}>What to notify me about</h3>
              {[
                ['Session reminders','15 min before each session',true],
                ['Mentor responses','When a mentor replies',true],
                ['Elm Together requests','When a peer wants to study with you',true],
                ['Community mentions','Someone @s you',true],
                ['Interview matches','When a peer match is found',true],
                ['Weekly digest','Study summary every Sunday',false],
                ['Marketing','New features and product updates',false],
              ].map(([n,d,on], i, a) => <ToggleRow key={n} title={n} sub={d} defaultOn={on} last={i === a.length-1}/>)}
            </div>
          )}
          {section === 'help' && (
            <>
              <div className="card" style={{ padding: 32 }}>
                <h3 className="font-heading" style={{ fontSize: 18, fontWeight: 600, marginBottom: 10 }}>Help & support</h3>
                <p style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.6 }}>Browse our knowledge base, or reach out — we respond within 4 hours.</p>
                <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
                  <button className="btn btn-ghost btn-md">Knowledge base</button>
                  <button className="btn btn-primary btn-md">Contact support</button>
                </div>
              </div>
              <div className="card" style={{ padding: 26 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                  <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, fontWeight: 600, letterSpacing: '0.10em', color: 'var(--text-tertiary)', textTransform: 'uppercase', padding: '3px 7px', border: '1px solid var(--border-default)', borderRadius: 4 }}>DEV</span>
                  <h3 className="font-heading" style={{ fontSize: 16, fontWeight: 600, color: 'var(--text-secondary)', margin: 0 }}>Preview screens</h3>
                </div>
                <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 16 }}>Jump directly to utility & error screens.</p>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  <button className="btn btn-ghost btn-sm" onClick={() => navigate && navigate('404')}>Preview 404</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => navigate && navigate('500')}>Preview 500</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => navigate && navigate('maintenance')}>Preview Maintenance</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => navigate && navigate('session-expired')}>Preview Session Expired</button>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

const SettingRow = ({ title, sub, right, last }) => (
  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 0', borderBottom: last ? 'none' : '1px solid var(--border-subtle)' }}>
    <div>
      <div style={{ fontFamily: 'Inter', fontWeight: 500, fontSize: 14 }}>{title}</div>
      <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 2 }}>{sub}</div>
    </div>
    {right}
  </div>
);

const ToggleRow = ({ title, sub, defaultOn, last }) => {
  const [on, setOn] = useState(defaultOn);
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 0', borderBottom: last ? 'none' : '1px solid var(--border-subtle)' }}>
      <div>
        <div style={{ fontFamily: 'Inter', fontWeight: 500, fontSize: 14 }}>{title}</div>
        <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 2 }}>{sub}</div>
      </div>
      <button onClick={() => setOn(!on)} style={{
        width: 42, height: 24, borderRadius: 999,
        background: on ? 'var(--text-primary)' : 'var(--bg-subtle)',
        position: 'relative', transition: 'background 220ms',
      }}>
        <div style={{ position: 'absolute', top: 2, left: on ? 20 : 2, width: 20, height: 20, borderRadius: 999, background: '#fff', boxShadow: 'var(--shadow-xs)', transition: 'left 240ms var(--ease-spring)' }}/>
      </button>
    </div>
  );
};

window.Community = Community;
window.Settings = Settings;

  </script>

  <!-- src/rooms-extra.jsx -->
  <script type="text/babel">
/* global React, Icon, Avatar, StatusRing */
const { useState: useStateRX, useEffect: useEffectRX, useRef: useRefRX } = React;

// ═══════════════════════════════════════════════════════
// FIX 1 — CREATE ROOM MODAL
// FIX 2 — PARTICIPANTS DRAWER
// FIX 3 — SESSION CONTROLS / RoomSession
// FIX 4 — GROUP INTERVIEW ROOM
// FIX 5 — SUBSCRIPTION GATE MODAL (6 variants)
// ═══════════════════════════════════════════════════════

// ── Shared modal backdrop ─────────────────────
const RXBackdrop = ({ children, onClose }) => (
  <div onClick={onClose} style={{
    position: 'fixed', inset: 0, zIndex: 600,
    background: 'rgba(7,10,24,0.70)', backdropFilter: 'blur(8px)',
    display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24,
  }}>
    <div onClick={e => e.stopPropagation()}>{children}</div>
  </div>
);

// ─────────────────────────────────────────────────────────
// FIX 1 — CREATE ROOM MODAL
// ─────────────────────────────────────────────────────────
const RX_SUBJECTS = ['Algorithms','Calculus','Linear Algebra','Quantum Physics','Organic Chemistry','Molecular Biology','Mechanical Eng','Microeconomics','Marketing','Constitutional Law','Anatomy','Statistics','UX Research','Mandarin'];
const RX_TYPES = [
  { id: 'public', icon: '🌐', label: 'Public', desc: 'Anyone can join' },
  { id: 'collab', icon: '💬', label: 'Collaborative', desc: 'Discuss freely' },
  { id: 'private', icon: '🔒', label: 'Private', desc: 'Password protected' },
  { id: 'interview', icon: '🎤', label: 'Group Interview', desc: 'Practice mock rounds' },
];

const CreateRoomModal = ({ onClose, onCreate, user }) => {
  const u = user || window.USER || { plan: 'Free', collabRoomsCreatedToday: 0 };
  const collabLeft = (window.collabRoomsLeft ? window.collabRoomsLeft(u) : Infinity);
  const collabQuota = (window.COLLAB_ROOM_QUOTA ? window.COLLAB_ROOM_QUOTA[u.plan] : Infinity);
  const [name, setName] = useStateRX('');
  const [subject, setSubject] = useStateRX('');
  const [subjQuery, setSubjQuery] = useStateRX('');
  const [subjOpen, setSubjOpen] = useStateRX(false);
  const [type, setType] = useStateRX('public');
  const [password, setPassword] = useStateRX('');
  const [mode, setMode] = useStateRX('discussion');
  const [pomo, setPomo] = useStateRX('classic');
  const [customWork, setCustomWork] = useStateRX(45);
  const [customBreak, setCustomBreak] = useStateRX(10);
  const [maxP, setMaxP] = useStateRX(10);
  const [inviteOnly, setInviteOnly] = useStateRX(false);
  const [iFormat, setIFormat] = useStateRX('Technical');
  const [iSpeakerTime, setISpeakerTime] = useStateRX(5);
  const [evaluator, setEvaluator] = useStateRX(true);
  const [submitting, setSubmitting] = useStateRX(false);
  const [exiting, setExiting] = useStateRX(false);

  useEffectRX(() => {
    const onKey = (e) => { if (e.key === 'Escape') doClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  useEffectRX(() => {
    if (type === 'interview') setMaxP(6);
  }, [type]);

  const doClose = () => { setExiting(true); setTimeout(onClose, 220); };

  const submit = () => {
    if (!name.trim() || !subject) return;
    if (type === 'collab' && !(window.canCreateCollabRoom ? window.canCreateCollabRoom(u) : true)) {
      if (window.openGate) window.openGate('collab-room', { plan: u.plan, quota: collabQuota });
      return;
    }
    setSubmitting(true);
    if (type === 'collab' && window.updateUser) {
      window.updateUser(prev => ({ ...prev, collabRoomsCreatedToday: (prev.collabRoomsCreatedToday || 0) + 1 }));
    }
    setTimeout(() => {
      const newRoom = {
        id: 'r-' + Date.now(),
        name, subject, type, mode,
        pomodoro: pomo === 'custom' ? `${customWork}/${customBreak}` : pomo,
        max: maxP, count: 1,
        host: 'You',
        format: type === 'interview' ? iFormat : null,
        speakerTime: type === 'interview' ? iSpeakerTime : null,
        evaluator: type === 'interview' ? evaluator : null,
      };
      onCreate(newRoom);
    }, 800);
  };

  const filteredSubj = RX_SUBJECTS.filter(s => s.toLowerCase().includes(subjQuery.toLowerCase()));

  return (
    <RXBackdrop onClose={doClose}>
      <div style={{
        width: 480, maxHeight: '85vh', overflow: 'auto',
        background: 'var(--bg-surface)',
        borderRadius: 'var(--radius-2xl, 24px)',
        border: '1px solid var(--border-subtle)',
        boxShadow: 'var(--shadow-xl)',
        animation: exiting ? 'modalOut 200ms var(--ease-in-expo) forwards' : 'modalIn 350ms var(--ease-out-expo)',
      }}>
        {/* Header */}
        <div style={{ padding: '22px 28px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid var(--border-subtle)' }}>
          <div>
            <div className="font-display" style={{ fontFamily: 'Fraunces', fontSize: 22, fontWeight: 700 }}>Start a study room</div>
            <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 2 }}>Pick how you want to focus together.</div>
          </div>
          <button onClick={doClose} style={{ width: 30, height: 30, borderRadius: 8, color: 'var(--text-tertiary)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="x" size={16}/>
          </button>
        </div>

        <div style={{ padding: 24, display: 'flex', flexDirection: 'column', gap: 18 }}>
          {/* Name */}
          <div>
            <RXLabel>Room name<RXCounter v={name.length} m={48}/></RXLabel>
            <input value={name} onChange={e => setName(e.target.value.slice(0, 48))} placeholder="Wednesday DP grind"
              style={rxInput}/>
          </div>

          {/* Subject searchable */}
          <div style={{ position: 'relative' }}>
            <RXLabel>Subject</RXLabel>
            <button onClick={() => setSubjOpen(!subjOpen)} style={{ ...rxInput, textAlign: 'left', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ color: subject ? 'var(--text-primary)' : 'var(--text-muted)' }}>{subject || 'Select a subject…'}</span>
              <Icon name="chevronD" size={14}/>
            </button>
            {subjOpen && (
              <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, marginTop: 4, background: 'var(--bg-surface)', border: '1px solid var(--border-default)', borderRadius: 12, maxHeight: 220, overflowY: 'auto', zIndex: 10, boxShadow: 'var(--shadow-md)' }}>
                <input autoFocus value={subjQuery} onChange={e => setSubjQuery(e.target.value)} placeholder="Search…"
                  style={{ width: '100%', height: 36, padding: '0 12px', border: 'none', borderBottom: '1px solid var(--border-subtle)', background: 'transparent', fontSize: 13, outline: 'none' }}/>
                {filteredSubj.map(s => (
                  <button key={s} onClick={() => { setSubject(s); setSubjOpen(false); setSubjQuery(''); }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-hover)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                    style={{ display: 'block', width: '100%', textAlign: 'left', padding: '8px 12px', fontSize: 13, color: 'var(--text-primary)' }}>{s}</button>
                ))}
              </div>
            )}
          </div>

          {/* Room type 2x2 */}
          <div>
            <RXLabel>Room type</RXLabel>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {type === 'collab' && u.plan !== 'Elite' && (
                <div style={{ gridColumn: '1 / -1', fontSize: 11, color: collabLeft > 0 ? 'var(--text-tertiary)' : 'var(--danger-500)', marginBottom: 4 }}>
                  {collabLeft > 0 ? `${collabLeft} collaborative room${collabLeft === 1 ? '' : 's'} left today` : `Daily limit reached (${collabQuota}/day on ${u.plan})`}
                </div>
              )}
              {RX_TYPES.map(t => {
                const sel = type === t.id;
                return (
                  <button key={t.id} onClick={() => setType(t.id)} style={{
                    padding: 14, borderRadius: 12, textAlign: 'left',
                    background: sel ? 'var(--glass-brand-bg)' : 'var(--bg-surface)',
                    border: '1.5px solid ' + (sel ? 'var(--brand-500)' : 'var(--border-default)'),
                    boxShadow: sel ? '0 0 0 4px rgba(42,63,184,0.10)' : 'none',
                    transition: 'all 180ms',
                  }}>
                    <div style={{ fontSize: 18, marginBottom: 4 }}>{t.icon}</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-primary)' }}>{t.label}</div>
                    <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 2 }}>{t.desc}</div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Slide-in: password */}
          {type === 'private' && (
            <div style={{ animation: 'fadeInUp 280ms var(--ease-out-expo)' }}>
              <RXLabel>Room password</RXLabel>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="At least 4 characters"
                style={rxInput}/>
            </div>
          )}

          {/* Slide-in: interview extras */}
          {type === 'interview' && (
            <div style={{ animation: 'fadeInUp 280ms var(--ease-out-expo)', padding: 14, background: 'var(--bg-base)', borderRadius: 12, border: '1px solid var(--border-subtle)' }}>
              <RXLabel>Interview format</RXLabel>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>
                {[
                  { v: 'Technical', i: '💻' },{ v: 'HR', i: '🤝' },
                  { v: 'Case Study', i: '📊' },{ v: 'Mock GD', i: '👥' },
                ].map(f => {
                  const sel = iFormat === f.v;
                  return (
                    <button key={f.v} onClick={() => setIFormat(f.v)} style={{
                      height: 30, padding: '0 12px', borderRadius: 999, fontSize: 12, fontWeight: 600,
                      background: sel ? 'var(--gradient-brand)' : 'var(--bg-surface)',
                      color: sel ? '#fff' : 'var(--text-secondary)',
                      border: '1px solid ' + (sel ? 'transparent' : 'var(--border-default)'),
                    }}>{f.i} {f.v}</button>
                  );
                })}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                <span style={{ fontSize: 12, fontWeight: 600 }}>Time per speaker</span>
                <RXStepper value={iSpeakerTime} onChange={setISpeakerTime} min={2} max={20} suffix="min"/>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, fontWeight: 600 }}>Enable evaluator</span>
                <RXToggle on={evaluator} onChange={setEvaluator}/>
              </div>
            </div>
          )}

          {/* Study mode pills */}
          <div>
            <RXLabel>Study mode</RXLabel>
            <div style={{ display: 'flex', gap: 6 }}>
              {[
                { v: 'silent', l: '🔇 Silent' },
                { v: 'discussion', l: '💬 Discussion' },
                { v: 'live', l: '⚡ Live' },
              ].map(m => {
                const sel = mode === m.v;
                return (
                  <button key={m.v} onClick={() => setMode(m.v)} style={{
                    flex: 1, height: 36, borderRadius: 999, fontSize: 12, fontWeight: 600,
                    background: sel ? 'var(--gradient-brand)' : 'var(--bg-surface)',
                    color: sel ? '#fff' : 'var(--text-secondary)',
                    border: '1px solid ' + (sel ? 'transparent' : 'var(--border-default)'),
                  }}>{m.l}</button>
                );
              })}
            </div>
          </div>

          {/* Pomodoro */}
          <div>
            <RXLabel>Pomodoro preset</RXLabel>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
              {[
                { v: 'classic', l: 'Classic', s: '25/5' },
                { v: 'deep', l: 'Deep', s: '50/10' },
                { v: 'long', l: 'Long', s: '90/20' },
                { v: 'custom', l: 'Custom', s: '⚙' },
              ].map(p => {
                const sel = pomo === p.v;
                return (
                  <button key={p.v} onClick={() => setPomo(p.v)} style={{
                    padding: '8px 0', borderRadius: 10, fontSize: 11, fontWeight: 600, lineHeight: 1.3,
                    background: sel ? 'var(--gradient-brand)' : 'var(--bg-surface)',
                    color: sel ? '#fff' : 'var(--text-secondary)',
                    border: '1px solid ' + (sel ? 'transparent' : 'var(--border-default)'),
                  }}>
                    <div>{p.l}</div>
                    <div style={{ fontFamily: 'JetBrains Mono', fontSize: 10, opacity: sel ? 0.85 : 0.7 }}>{p.s}</div>
                  </button>
                );
              })}
            </div>
            {pomo === 'custom' && (
              <div style={{ display: 'flex', gap: 8, marginTop: 8, animation: 'fadeInUp 200ms' }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10, color: 'var(--text-tertiary)', marginBottom: 4 }}>Work (min)</div>
                  <input type="number" value={customWork} onChange={e => setCustomWork(parseInt(e.target.value)||25)} style={rxInput}/>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10, color: 'var(--text-tertiary)', marginBottom: 4 }}>Break (min)</div>
                  <input type="number" value={customBreak} onChange={e => setCustomBreak(parseInt(e.target.value)||5)} style={rxInput}/>
                </div>
              </div>
            )}
          </div>

          {/* Max participants */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <RXLabel inline>Max participants {type === 'interview' && <span style={{ color: 'var(--text-tertiary)', fontWeight: 400 }}>(locked at 6)</span>}</RXLabel>
            <RXStepper value={maxP} onChange={setMaxP} min={2} max={50} disabled={type === 'interview'}/>
          </div>

          {/* Invite only */}
          <div style={{ padding: 12, background: 'var(--bg-base)', borderRadius: 12, border: '1px solid var(--border-subtle)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>Invite only</div>
                <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>Hide from public list, join by link only</div>
              </div>
              <RXToggle on={inviteOnly} onChange={setInviteOnly}/>
            </div>
            {inviteOnly && (
              <div style={{ marginTop: 10, display: 'flex', gap: 6, animation: 'fadeInUp 200ms' }}>
                <input readOnly value={`elmorigin.com/r/${(name || 'untitled').toLowerCase().replace(/\s+/g,'-')}`} style={{ ...rxInput, height: 34, fontFamily: 'JetBrains Mono', fontSize: 11 }}/>
                <button className="btn btn-ghost btn-sm" style={{ height: 34 }}>Copy</button>
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding: '16px 24px', borderTop: '1px solid var(--border-subtle)', display: 'flex', gap: 10 }}>
          <button onClick={doClose} className="btn btn-ghost btn-md" style={{ flex: 1 }}>Cancel</button>
          <button onClick={submit} disabled={!name.trim() || !subject || submitting} className="btn btn-brand btn-lg" style={{ flex: 2, background: 'var(--gradient-brand)', opacity: (!name.trim() || !subject) ? 0.5 : 1 }}>
            {submitting ? <span style={{ width: 16, height: 16, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: 999, animation: 'orbit 800ms linear infinite' }}/> : 'Create & Enter Room →'}
          </button>
        </div>
      </div>
    </RXBackdrop>
  );
};

const RXLabel = ({ children, inline }) => (
  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: inline ? 0 : 6 }}>
    <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>{children}</label>
  </div>
);
const RXCounter = ({ v, m }) => <span style={{ fontSize: 11, fontFamily: 'JetBrains Mono', color: v > m ? 'var(--danger-500)' : 'var(--text-tertiary)' }}>{v}/{m}</span>;
const rxInput = {
  width: '100%', height: 40, padding: '0 14px',
  background: 'var(--bg-surface)', border: '1.5px solid var(--border-default)',
  borderRadius: 10, fontSize: 13, fontFamily: 'Inter', color: 'var(--text-primary)', outline: 'none',
};

const RXStepper = ({ value, onChange, min = 0, max = 100, suffix, disabled }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 0, opacity: disabled ? 0.5 : 1, pointerEvents: disabled ? 'none' : 'auto' }}>
    <button onClick={() => onChange(Math.max(min, value - 1))} style={{ width: 28, height: 28, borderRadius: '8px 0 0 8px', border: '1px solid var(--border-default)', background: 'var(--bg-surface)', color: 'var(--text-secondary)', fontSize: 14, fontWeight: 700 }}>−</button>
    <div style={{ minWidth: 50, height: 28, padding: '0 10px', borderTop: '1px solid var(--border-default)', borderBottom: '1px solid var(--border-default)', background: 'var(--bg-surface)', fontSize: 12, fontWeight: 700, fontFamily: 'JetBrains Mono', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{value}{suffix && <span style={{ fontSize: 9, marginLeft: 3, color: 'var(--text-tertiary)' }}>{suffix}</span>}</div>
    <button onClick={() => onChange(Math.min(max, value + 1))} style={{ width: 28, height: 28, borderRadius: '0 8px 8px 0', border: '1px solid var(--border-default)', background: 'var(--bg-surface)', color: 'var(--text-secondary)', fontSize: 14, fontWeight: 700 }}>+</button>
  </div>
);

const RXToggle = ({ on, onChange }) => (
  <button onClick={() => onChange(!on)} style={{
    width: 40, height: 22, borderRadius: 999, position: 'relative',
    background: on ? 'var(--gradient-brand)' : 'var(--bg-hover)', border: 'none',

const GateModal = ({ variant = 'generic', context, onClose, onUpgrade }) => {
  const [shake, setShake] = useStateRX(false);
  const [exiting, setExiting] = useStateRX(false);
  const raw = GATE_VARIANTS[variant] || GATE_VARIANTS.generic;
  const interpolate = (str) => {
    if (!context) return str;
    return Object.entries(context).reduce((s, [k, val]) => s.split('{' + k + '}').join(String(val)), str);
  };
  const v = { ...raw, headline: interpolate(raw.headline), desc: interpolate(raw.desc), free: interpolate(raw.free), pro: interpolate(raw.pro) };

  const doClose = () => {
    setShake(true);
    setTimeout(() => { setExiting(true); setTimeout(onClose, 220); }, 320);
  };
  useEffectRX(() => {
    const onKey = (e) => { if (e.key === 'Escape') doClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <RXBackdrop onClose={doClose}>
      <div style={{
        width: 440, padding: 40, borderRadius: 24,
        background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)',
        boxShadow: 'var(--shadow-xl)', textAlign: 'center',
        animation: exiting ? 'modalOut 220ms forwards' : (shake ? 'shake 320ms' : 'modalIn 350ms var(--ease-out-expo)'),
      }}>
        <div style={{
          width: 56, height: 56, borderRadius: 16, margin: '0 auto 20px',
          background: 'linear-gradient(135deg, rgba(13,23,87,0.12), rgba(61,82,204,0.12))',
          color: 'var(--brand-600)', fontSize: 26,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        }}>{v.icon}</div>
        <h2 className="font-display italic" style={{ fontFamily: 'Fraunces', fontSize: 24, fontWeight: 700, fontStyle: 'italic', marginBottom: 10, lineHeight: 1.2 }}>
          {v.headline}
        </h2>
        <p style={{ fontFamily: 'Instrument Sans', fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.55, marginBottom: 22 }}>
          {v.desc}
        </p>
        <div style={{ background: 'var(--bg-base)', border: '1px solid var(--border-subtle)', borderRadius: 12, padding: '12px 16px', marginBottom: 20, textAlign: 'left' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'var(--text-tertiary)', marginBottom: 6 }}>
            <span style={{ color: 'var(--text-muted)', fontFamily: 'JetBrains Mono', fontWeight: 700 }}>✗</span> {v.free}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'var(--text-primary)', fontWeight: 600 }}>
            <span style={{ color: 'var(--mint-500)', fontFamily: 'JetBrains Mono', fontWeight: 700 }}>✓</span> {v.pro}
          </div>
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 16 }}>
          Joined by <strong style={{ color: 'var(--text-primary)' }}>8,400+ Pro students</strong> this week
        </div>
        <button onClick={onUpgrade} className="btn btn-brand btn-lg" style={{ width: '100%', background: 'var(--gradient-brand)', marginBottom: 8 }}>
          Upgrade to Pro — ₹499/mo
        </button>
        <button onClick={doClose} className="btn btn-ghost btn-sm" style={{ width: '100%', color: 'var(--text-tertiary)' }}>Maybe later</button>

};

  <button onClick={onClick} style={{
    width: 42, height: 42, borderRadius: 12, fontSize: 16,
    background: active ? 'var(--gradient-brand)' : (danger ? 'rgba(225,29,72,0.10)' : 'var(--bg-base)'),
    color: active ? '#fff' : (danger ? 'var(--danger-500)' : 'var(--text-secondary)'),
    border: '1px solid ' + (active ? 'transparent' : (danger ? 'rgba(225,29,72,0.25)' : 'var(--border-default)')),
    transition: 'all 180ms', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
  }}>{icon}</button>
);

// ─────────────────────────────────────────────────────────
// FIX 4 — GROUP INTERVIEW SESSION
// ─────────────────────────────────────────────────────────
const GroupInterviewSession = ({ room, navigate, onLeaveSummary }) => {
  const [turn, setTurn] = useStateRX(1);
  const [countdown, setCountdown] = useStateRX((room?.speakerTime || 5) * 60);
  const [ratings, setRatings] = useStateRX({ comm: 0, tech: 0, conf: 0 });
  const [feedbackNotes, setFeedbackNotes] = useStateRX('');
  const [savedSet, setSavedSet] = useStateRX(new Set());
  const [drawer, setDrawer] = useStateRX(false);
  const [ended, setEnded] = useStateRX(false);
  const [askEnd, setAskEnd] = useStateRX(false);
  const [elapsed, setElapsed] = useStateRX(0);

  const speakers = [
    { id: 1, name: 'Arjun Patel' },
    { id: 2, name: 'Priya Singh' },
    { id: 3, name: 'Rohan Mehta' },
    { id: 4, name: 'Sara Kapoor' },
    { id: 5, name: 'Vikram Joshi' },
  ];

  useEffectRX(() => {
    const t = setInterval(() => {
      setCountdown(c => Math.max(0, c - 1));
      setElapsed(e => e + 1);
    }, 1000);
    return () => clearInterval(t);
  }, []);

  useEffectRX(() => { setCountdown((room?.speakerTime || 5) * 60); }, [turn, room]);

  const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const fmtElapsed = (s) => `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const next = () => {
    if (turn >= speakers.length) { setAskEnd(true); return; }
    setSavedSet(s => new Set([...s, turn]));
    setRatings({ comm: 0, tech: 0, conf: 0 });
    setFeedbackNotes('');
    setTurn(t => t + 1);
  };

  const cdColor = countdown < 10 ? 'var(--danger-500)' : countdown < 30 ? 'var(--gold-500)' : 'var(--text-primary)';

  if (ended) {
    return (
      <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: 'var(--bg-base)', overflow: 'auto', padding: 40 }}>
        <div style={{ maxWidth: 720, margin: '0 auto' }}>
          <div style={{ textAlign: 'center', padding: '40px 0 30px' }}>
            <div style={{ width: 64, height: 64, borderRadius: 999, background: 'var(--gradient-brand)', color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 18, boxShadow: 'var(--shadow-lg)' }}>
              <Icon name="check" size={30}/>
            </div>
            <h1 className="font-display italic" style={{ fontFamily: 'Fraunces', fontStyle: 'italic', fontSize: 36, fontWeight: 800, marginBottom: 8 }}>Interview complete ✓</h1>
            <p style={{ color: 'var(--text-tertiary)' }}>{speakers.length} participants · {fmtElapsed(elapsed)} elapsed</p>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 14, marginBottom: 32 }}>
            {speakers.map(s => (
              <div key={s.id} style={{ background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', borderRadius: 16, padding: 18, display: 'flex', alignItems: 'center', gap: 12 }}>
                <Avatar name={s.name} size={48}/>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{s.name}</div>
                  <div style={{ fontFamily: 'JetBrains Mono', fontSize: 12, color: 'var(--gold-600)' }}>★ {(3.8 + s.id * 0.1).toFixed(1)}</div>
                  <div style={{ fontSize: 11, color: 'var(--mint-600)', marginTop: 2 }}>Feedback saved ✓</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn btn-ghost btn-lg" style={{ flex: 1 }}>View full feedback report</button>
            <button onClick={() => navigate('home')} className="btn btn-brand btn-lg" style={{ flex: 1, background: 'var(--gradient-brand)' }}>Return to dashboard</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: 'var(--bg-base)', display: 'flex', flexDirection: 'column' }}>
      {/* TOP BAR */}
      <div style={{ height: 48, padding: '0 20px', background: 'var(--bg-surface)', borderBottom: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', gap: 12 }}>
        <span className="font-display" style={{ fontFamily: 'Fraunces', fontSize: 14, fontWeight: 700 }}>{room?.name || 'Mock Interview'}</span>
        <span style={{ height: 22, padding: '0 8px', background: 'linear-gradient(135deg, rgba(245,158,11,0.18), rgba(245,158,11,0.08))', color: 'var(--gold-700)', borderRadius: 999, fontSize: 10, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 4 }}>🎤 GROUP INTERVIEW</span>
        <span className="chip chip-brand" style={{ fontSize: 11 }}>{room?.format || 'Technical'}</span>
        <div style={{ flex: 1 }}/>
        <span style={{ fontFamily: 'JetBrains Mono', fontSize: 12, color: 'var(--text-tertiary)' }}>{fmtElapsed(elapsed)}</span>
        <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>· {speakers.length} participants</span>
      </div>

      {/* MAIN 3-COL */}
      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '200px 1fr 240px', gap: 12, padding: 16, overflow: 'hidden' }}>
        {/* Turn Order */}
        <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', borderRadius: 14, padding: 14, overflowY: 'auto' }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>Turn order</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {speakers.map((s, i) => {
              const isDone = savedSet.has(s.id);
              const isCur = s.id === turn;
              return (
                <div key={s.id} style={{
                  display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px',
                  background: isCur ? 'var(--gradient-brand)' : (isDone ? 'var(--bg-base)' : 'var(--bg-surface)'),
                  color: isCur ? '#fff' : (isDone ? 'var(--text-tertiary)' : 'var(--text-primary)'),
                  border: '1px solid ' + (isCur ? 'transparent' : 'var(--border-subtle)'),
                  borderRadius: 10, fontSize: 12, fontWeight: 600,
                  animation: isCur ? 'pulse 2.4s infinite' : 'none',
                  opacity: isDone ? 0.55 : 1,
                }}>
                  <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10 }}>{i + 1}</span>
                  <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.name}</span>
                  {isDone && <Icon name="check" size={12}/>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Speaker spotlight */}
        <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', borderRadius: 16, padding: 24, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
          <div style={{ width: 280, height: 280, borderRadius: 24, background: 'var(--bg-base)', border: '1px solid var(--border-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
            <div style={{ position: 'absolute', inset: -4, borderRadius: 26, background: 'var(--gradient-brand)', filter: 'blur(8px)', opacity: 0.35, animation: 'pulse 2.4s infinite' }}/>
            <div style={{ position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              <Avatar name={speakers.find(s => s.id === turn)?.name || 'A'} size={96}/>
              <div className="font-display" style={{ fontFamily: 'Fraunces', fontSize: 22, fontWeight: 600, marginTop: 14 }}>
                {speakers.find(s => s.id === turn)?.name}
              </div>
              <div style={{ fontSize: 11, color: 'var(--mint-600)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', marginTop: 4 }}>● Speaking</div>
            </div>
          </div>
          <div style={{ fontFamily: 'JetBrains Mono', fontSize: 56, fontWeight: 700, color: cdColor, marginTop: 24, animation: countdown < 10 ? 'shake 320ms infinite' : 'none' }}>
            {fmt(countdown)}
          </div>
          <div style={{ display: 'flex', gap: 6, marginTop: 18, flexWrap: 'wrap', justifyContent: 'center' }}>
            {speakers.filter(s => s.id !== turn).slice(0, 4).map((s, i) => {
              const isNext = s.id === turn + 1;
              return (
                <div key={s.id} style={{
                  width: 80, height: 96, borderRadius: 12,
                  background: 'var(--bg-base)', border: '1px solid ' + (isNext ? 'var(--gold-500)' : 'var(--border-subtle)'),
                  padding: 8, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                  animation: isNext ? 'pulse 2s infinite' : 'none',
                }}>
                  <Avatar name={s.name} size={36}/>
                  <div style={{ fontSize: 10, fontWeight: 600, marginTop: 6, textAlign: 'center', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '100%' }}>{s.name.split(' ')[0]}</div>
                  {isNext && <div style={{ fontSize: 9, color: 'var(--gold-700)', fontWeight: 700 }}>NEXT</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Feedback Panel */}
        <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', borderRadius: 14, padding: 16, overflowY: 'auto' }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 12 }}>Feedback for current speaker</div>
          {[
            { k: 'comm', l: 'Communication' },
            { k: 'tech', l: 'Technical depth' },
            { k: 'conf', l: 'Confidence' },
          ].map(r => (
            <div key={r.k} style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 4 }}>{r.l}</div>
              <div style={{ display: 'flex', gap: 4 }}>
                {[1,2,3,4,5].map(n => (
                  <button key={n} onClick={() => setRatings({ ...ratings, [r.k]: n })} style={{ fontSize: 16, color: ratings[r.k] >= n ? 'var(--gold-500)' : 'var(--text-muted)' }}>★</button>
                ))}
              </div>
            </div>
          ))}
          <textarea value={feedbackNotes} onChange={e => setFeedbackNotes(e.target.value)} placeholder="Strengths, areas to improve…"
            style={{ width: '100%', height: 90, padding: 10, border: '1px solid var(--border-default)', borderRadius: 10, fontSize: 12, fontFamily: 'Instrument Sans', resize: 'none', outline: 'none', background: 'var(--bg-base)', marginBottom: 10 }}/>
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={() => { setSavedSet(s => new Set([...s, turn])); }} className="btn btn-ghost btn-sm" style={{ flex: 1 }}>Save</button>
            <button onClick={next} className="btn btn-ghost btn-sm" style={{ flex: 1 }}>Skip →</button>
          </div>
        </div>
      </div>

      {/* BOTTOM */}
      <div style={{ height: 56, padding: '0 16px', background: 'var(--bg-surface)', borderTop: '1px solid var(--border-subtle)', display: 'grid', gridTemplateColumns: '1fr auto 1fr', gap: 8, alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 6 }}>
          <button className="btn btn-ghost btn-sm">📝 Notes</button>
          <button className="btn btn-ghost btn-sm">📋 Agenda</button>
          <button className="btn btn-ghost btn-sm">🎙 Mute</button>
          <button className="btn btn-ghost btn-sm">📷 Camera</button>
          <button className="btn btn-ghost btn-sm">🖥 Share</button>
        </div>
        <button onClick={next} className="btn btn-brand btn-md" style={{ background: 'var(--gradient-brand)' }}>→ Next Speaker</button>
        <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
          <button className="btn btn-ghost btn-sm">💬 Chat</button>
          <button onClick={() => setDrawer(true)} className="btn btn-ghost btn-sm">👥 Participants</button>
          <button onClick={() => setAskEnd(true)} className="btn btn-ghost btn-sm" style={{ color: 'var(--danger-500)' }}>→ Leave</button>
        </div>
      </div>

      {drawer && <ParticipantsDrawer onClose={() => setDrawer(false)} participants={speakers.map((s, i) => ({ ...s, host: i === 0, studyTime: fmtElapsed(elapsed - i*60), status: i === turn-1 ? 'focused' : (savedSet.has(s.id) ? 'break' : 'focused'), hasPro: i % 2 === 0 }))} currentUser="Arjun Patel" onElmTogether={() => {}}/>}
      {askEnd && (
        <RXBackdrop onClose={() => setAskEnd(false)}>
          <div style={{ width: 420, padding: 28, background: 'var(--bg-surface)', borderRadius: 18, boxShadow: 'var(--shadow-xl)', animation: 'modalIn 320ms' }}>
            <div className="font-display italic" style={{ fontFamily: 'Fraunces', fontSize: 20, fontWeight: 700, fontStyle: 'italic', marginBottom: 8 }}>End the session?</div>
            <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 18 }}>Everyone will see the summary and feedback report.</p>
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => setAskEnd(false)} className="btn btn-ghost btn-md" style={{ flex: 1 }}>Cancel</button>
              <button onClick={() => { setAskEnd(false); setEnded(true); }} className="btn btn-brand btn-md" style={{ flex: 1, background: 'var(--gradient-brand)' }}>End session</button>
            </div>
          </div>
        </RXBackdrop>
      )}
    </div>
  );
};

window.CreateRoomModal = CreateRoomModal;
window.GateModal = GateModal;
window.ParticipantsDrawer = ParticipantsDrawer;
window.RoomSession = RoomSession;
window.GroupInterviewSession = GroupInterviewSession;

  </script>

  <script type="text/babel">
/* global React, Icon, Avatar */
const { useState: useStateMO, useEffect: useEffectMO, useRef: useRefMO } = React;

// ═══════════════════════════════════════════════════════
// MENTOR APPLICATION + MENTOR SETUP (6 steps)
// Built to match existing AuthCard / Field patterns
// ═══════════════════════════════════════════════════════

const moExpertiseOptions = [
  'Computer Science','Mathematics','Physics','Chemistry','Biology',
  'Engineering','Economics','Business','Law','Medicine',
  'Data Science','Design','Languages','Other'
];

const moAmbientHero = {
  position: 'relative',
  background: 'var(--bg-surface)',
  backgroundImage: 'radial-gradient(ellipse 700px 320px at 92% -10%, rgba(27,43,142,0.06), transparent 60%)',
};

const MOLogo = ({ size = 30 }) => (
  <img src={window.__ELM_LOGO__} alt="Elm Origin" style={{ height: size, width: 'auto', display: 'block' }}/>
);

// ────────────────────────────────────────────────
// MENTOR APPLICATION PAGE  (route: mentor-apply)
// ────────────────────────────────────────────────
const MentorApplyPage = ({ navigate }) => {
  const [data, setData] = useStateMO({
    name: '', email: '', linkedin: '',
    primary: '', secondary: '', years: '',
    bio: '', files: [],
  });
  const [errors, setErrors] = useStateMO({});
  const [submitted, setSubmitted] = useStateMO(false);
  const [loading, setLoading] = useStateMO(false);
  const [dragOver, setDragOver] = useStateMO(false);

  const update = (patch) => setData(d => ({ ...d, ...patch }));

  const validate = () => {
    const e = {};
    if (!data.name.trim()) e.name = 'Required';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) e.email = 'Enter a valid email';
    if (!data.linkedin.trim() || !/linkedin\.com/i.test(data.linkedin)) e.linkedin = 'Enter your LinkedIn URL';
    if (!data.primary) e.primary = 'Pick one';
    if (!data.years) e.years = 'Pick one';
    if (data.bio.length > 300) e.bio = 'Max 300 characters';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = () => {
    if (!validate()) return;
    setLoading(true);
    setTimeout(() => { setLoading(false); setSubmitted(true); }, 700);
  };

  const onDropFiles = (fileList) => {
    const arr = Array.from(fileList).slice(0, 4).map(f => ({
      name: f.name, size: Math.round(f.size / 1024),
      kind: f.type.includes('pdf') ? 'pdf' : 'img'
    }));
    update({ files: [...data.files, ...arr].slice(0, 4) });
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg-base)', overflowY: 'auto' }}>
      {/* ── Hero strip 200px ── */}
      <div style={{
        height: 200, ...moAmbientHero,
        borderBottom: '1px solid var(--border-subtle)',
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        padding: '0 56px',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'absolute', top: 24, left: 56, right: 56 }}>
          <MOLogo size={28}/>
          <button onClick={() => navigate('landing')} className="btn btn-ghost btn-sm">← Back to landing</button>
        </div>
        <div style={{ maxWidth: 1080, margin: '0 auto', width: '100%', paddingTop: 28 }}>
          <h1 className="font-display" style={{
            fontFamily: 'Fraunces', fontWeight: 800, fontSize: 44, letterSpacing: '-0.02em',
            lineHeight: 1.05, color: 'var(--text-primary)',
            background: 'var(--gradient-brand)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
          }}>
            Teach what you know. Earn what you deserve.
          </h1>
          <div style={{ display: 'flex', gap: 22, marginTop: 14, flexWrap: 'wrap' }}>
            <div style={{ display: 'flex', gap: 22 }}>
              {[
                { v: '₹40L+', l: 'earned by mentors' },
                { v: '4.8★', l: 'avg rating' },
                { v: '120+', l: 'active mentors' },
              ].map(s => (
                <div key={s.l} style={{ fontFamily: 'Inter' }}>
                  <span style={{ fontFamily: 'JetBrains Mono', fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{s.v}</span>
                  <span style={{ fontSize: 12, color: 'var(--text-tertiary)', marginLeft: 6 }}>{s.l}</span>
                </div>
              ))}
            </div>
            <div style={{ flex: 1 }}/>
            <div style={{ display: 'flex', gap: 8 }}>
              {[
                { i: '◆', t: 'Your price' },
                { i: '◷', t: 'Your schedule' },
                { i: '★', t: 'Your reputation' },
              ].map(c => (
                <span key={c.t} className="chip chip-brand" style={{ fontSize: 12 }}>
                  <span style={{ fontFamily: 'JetBrains Mono', marginRight: 4, color: 'var(--brand-500)' }}>{c.i}</span>
                  {c.t}
                </span>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── Form card ── */}
      <div style={{ padding: '40px 20px 80px', display: 'flex', justifyContent: 'center' }}>
        <div className="modal-in" style={{
          width: '100%', maxWidth: 580,
          background: 'var(--bg-surface)',
          border: '1px solid var(--border-subtle)',
          borderRadius: 24, padding: 40,
          boxShadow: 'var(--shadow-xl)',
        }}>
          {!submitted ? (
            <>
              <h2 className="font-display" style={{ fontFamily: 'Fraunces', fontSize: 26, fontWeight: 700, marginBottom: 6 }}>
                Apply to mentor on ELM Origin
              </h2>
              <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 24 }}>
                Most applications get reviewed within 2–3 business days.
              </p>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <MOLabeled label="Full name" error={errors.name}>
                  <MOInput value={data.name} onChange={e => update({ name: e.target.value })} placeholder="Priya Sharma" error={errors.name}/>
                </MOLabeled>

                <MOLabeled label="Email" error={errors.email}>
                  <MOInput type="email" value={data.email} onChange={e => update({ email: e.target.value })} placeholder="you@email.com" error={errors.email}/>
                </MOLabeled>

                <MOLabeled label="LinkedIn URL" error={errors.linkedin}>
                  <MOInput value={data.linkedin} onChange={e => update({ linkedin: e.target.value })} placeholder="https://linkedin.com/in/…" error={errors.linkedin}/>
                </MOLabeled>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  <MOLabeled label="Primary expertise" error={errors.primary}>
                    <MOSelect value={data.primary} onChange={e => update({ primary: e.target.value })} error={errors.primary}>
                      <option value="">Select…</option>
                      {moExpertiseOptions.map(o => <option key={o}>{o}</option>)}
                    </MOSelect>
                  </MOLabeled>
                  <MOLabeled label="Secondary (optional)">
                    <MOSelect value={data.secondary} onChange={e => update({ secondary: e.target.value })}>
                      <option value="">None</option>
                      {moExpertiseOptions.map(o => <option key={o}>{o}</option>)}
                    </MOSelect>
                  </MOLabeled>
                </div>

                <MOLabeled label="Years teaching" error={errors.years}>
                  <div style={{ display: 'flex', gap: 6 }}>
                    {['<1','1–3','3–5','5–10','10+'].map(opt => {
                      const sel = data.years === opt;
                      return (
                        <button key={opt} onClick={() => update({ years: opt })} style={{
                          flex: 1, height: 38, borderRadius: 999, fontSize: 12, fontWeight: 600,
                          background: sel ? 'var(--gradient-brand)' : 'var(--bg-surface)',
                          color: sel ? '#fff' : 'var(--text-secondary)',
                          border: '1px solid ' + (sel ? 'transparent' : 'var(--border-default)'),
                          cursor: 'pointer', transition: 'all 200ms',
                        }}>{opt}</button>
                      );
                    })}
                  </div>
                </MOLabeled>

                <MOLabeled label="Short bio" right={<span style={{ fontSize: 11, color: data.bio.length > 300 ? 'var(--danger-500)' : 'var(--text-tertiary)', fontFamily: 'JetBrains Mono' }}>{data.bio.length}/300</span>}>
                  <textarea value={data.bio} onChange={e => update({ bio: e.target.value.slice(0, 300) })}
                    placeholder="Tell students what you teach and how you teach it…"
                    style={{
                      width: '100%', minHeight: 88, padding: '12px 14px',
                      background: 'var(--bg-surface)',
                      border: '1.5px solid var(--border-default)',
                      borderRadius: 12, fontSize: 14, fontFamily: 'Inter',
                      color: 'var(--text-primary)', resize: 'vertical',
                    }}/>
                </MOLabeled>

                <MOLabeled label="Credentials">
                  <div
                    onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                    onDrop={e => { e.preventDefault(); setDragOver(false); onDropFiles(e.dataTransfer.files); }}
                    style={{
                      border: `2px dashed ${dragOver ? 'var(--brand-500)' : 'var(--border-brand)'}`,
                      background: dragOver ? 'var(--glass-brand-bg)' : 'var(--bg-surface)',
                      borderRadius: 'var(--radius-xl)',
                      padding: 40, textAlign: 'center', cursor: 'pointer',
                      transition: 'all 200ms',
                    }}
                  >
                    <div style={{
                      width: 44, height: 44, borderRadius: 12,
                      background: 'var(--glass-brand-bg)', color: 'var(--brand-600)',
                      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 10,
                    }}>

// ────────────────────────────────────────────────
// MENTOR SETUP — 6 steps  (route: mentor-setup)
// ────────────────────────────────────────────────
const MentorSetupFlow = ({ navigate, prefilled, onComplete }) => {
  const [step, setStep] = useStateMO(1);
  const [data, setData] = useStateMO({
    email: prefilled?.email || 'mentor@elmorigin.com',
    password: '',
    photoDataUrl: null,
    headline: '',
    bio: '',
    name: prefilled?.name || 'Priya Sharma',
    primary: prefilled?.primary || 'Computer Science',
    subjects: [],
    levelsBySubject: {},
    languages: ['English'],
    education: [{ degree: '', institution: '', year: '' }],
    certs: [],
    linkedin: prefilled?.linkedin || '',
    days: { Mon: { on: true, slots: [['9:00 AM','5:00 PM']] }, Tue: { on: true, slots: [['9:00 AM','5:00 PM']] }, Wed: { on: true, slots: [['9:00 AM','5:00 PM']] }, Thu: { on: true, slots: [['9:00 AM','5:00 PM']] }, Fri: { on: true, slots: [['9:00 AM','5:00 PM']] }, Sat: { on: false, slots: [] }, Sun: { on: false, slots: [] } },
    buffer: 15,
    timezone: 'IST (UTC+5:30)',
    advance: '1 month',
    voiceOn: true, voice30: 599, voice60: 999,
    videoOn: true, video30: 799, video60: 1299,
    instant: true,
    pendingReview: false,
  });
  const update = (patch) => setData(d => ({ ...d, ...patch }));
  const total = 6;

  const finish = () => onComplete && onComplete();

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg-base)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '40px 20px' }}>
      <div style={{ width: '100%', maxWidth: 580 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 22 }}>
          <MOLogo size={26}/>
          <span style={{ fontSize: 11, fontFamily: 'Inter', fontWeight: 600, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Mentor onboarding</span>
        </div>

        {/* progress bar */}
        <div className="modal-in" style={{
          background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)',
          borderRadius: 24, padding: 36, boxShadow: 'var(--shadow-xl)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28 }}>
            <div style={{ display: 'flex', gap: 5, flex: 1 }}>
              {Array.from({ length: total }).map((_, i) => (
                <div key={i} style={{
                  height: 3, flex: 1, borderRadius: 999,
                  background: i < step ? 'var(--gradient-brand)' : 'var(--bg-hover)',
                  transition: 'background 320ms var(--ease-smooth)'
                }}/>
              ))}
            </div>
            <span style={{ marginLeft: 12, fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono', fontWeight: 600 }}>Step {step} of {total}</span>
          </div>

          {step > 1 && (
            <button onClick={() => setStep(s => s - 1)} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: 'var(--text-tertiary)', fontSize: 13, fontWeight: 500, marginBottom: 16 }}>
              <Icon name="chevronL" size={14}/> Back
            </button>
          )}

          {step === 1 && <MOStep1 data={data} update={update} next={() => setStep(2)}/>}
          {step === 2 && <MOStep2 data={data} update={update} next={() => setStep(3)}/>}
          {step === 3 && <MOStep3 data={data} update={update} next={() => setStep(4)}/>}
          {step === 4 && <MOStep4 data={data} update={update} next={() => setStep(5)}/>}
          {step === 5 && <MOStep5 data={data} update={update} next={() => { update({ pendingReview: !!prefilled?.fromApply }); setStep(6); }}/>}
          {step === 6 && <MOStep6 data={data} finish={finish}/>}
        </div>
      </div>
    </div>
  );
};

// ── STEP 1: Account ──
const MOStep1 = ({ data, update, next }) => {
  const score = (() => {
    const pw = data.password; if (!pw) return 0;
    let s = 0; if (pw.length >= 8) s++; if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++; if (/[0-9]/.test(pw)) s++; if (/[^A-Za-z0-9]/.test(pw) && pw.length >= 12) s++;
    return s;
  })();
  const can = score >= 2;
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  const colors = ['', 'var(--danger-500)', 'var(--gold-500)', 'var(--mint-500)', 'var(--brand-500)'];
  return (
    <>
      <h2 className="font-display" style={{ fontFamily: 'Fraunces', fontSize: 26, fontWeight: 700, marginBottom: 6 }}>Create your mentor account</h2>
      <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 22 }}>We'll use this to send you booking notifications and payouts.</p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <MOLabeled label="Email">
          <MOInput value={data.email} onChange={e => update({ email: e.target.value })}/>
        </MOLabeled>
        <MOLabeled label="Password" right={data.password && <span style={{ fontSize: 11, color: colors[score], fontWeight: 700 }}>{labels[score]}</span>}>
          <MOInput type="password" value={data.password} onChange={e => update({ password: e.target.value })} placeholder="At least 8 characters"/>
          <div style={{ display: 'flex', gap: 4, marginTop: 8 }}>
            {[1,2,3,4].map(i => (
              <div key={i} style={{ flex: 1, height: 3, borderRadius: 999, background: i <= score ? colors[score] : 'var(--bg-hover)', transition: 'background 240ms' }}/>
            ))}
          </div>
        </MOLabeled>
      </div>
      <button onClick={next} disabled={!can} className="btn btn-brand btn-lg" style={{ width: '100%', marginTop: 26, opacity: can ? 1 : 0.5, background: 'var(--gradient-brand)' }}>
        Continue <Icon name="chevronR" size={14}/>
      </button>
    </>
  );
};

// ── STEP 2: Profile & Photo ──

      setAiSuggesting(false);
    }, 900);
  };

  return (

      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: 24 }}>

        <button onClick={() => fileRef.current.click()} style={{

          background: data.photoDataUrl ? `center/cover url(${data.photoDataUrl})` : 'var(--glass-brand-bg)',
          border: '2px dashed ' + (data.photoDataUrl ? 'transparent' : 'var(--border-brand)'),
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          cursor: 'pointer', overflow: 'hidden',
          boxShadow: data.photoDataUrl ? 'var(--shadow-md)' : 'none',
        }}>
          {!data.photoDataUrl && (
            <div style={{ textAlign: 'center', color: 'var(--brand-600)' }}>
              <div style={{ fontSize: 28, lineHeight: 1, marginBottom: 6 }}>📷</div>
              <div style={{ fontSize: 11, fontWeight: 600 }}>Required</div>
              <div style={{ fontSize: 10, color: 'var(--text-tertiary)', marginTop: 2 }}>Click to upload</div>
            </div>
          )}
        </button>
        <div style={{ marginTop: 10, fontSize: 11, color: 'var(--text-tertiary)' }}>
          {data.photoDataUrl ? <button onClick={() => fileRef.current.click()} style={{ color: 'var(--brand-500)', fontWeight: 600 }}>Change photo</button> : 'PNG or JPG · 400×400 minimum'}
        </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>

        </MOLabeled>
        <MOLabeled label="Professional headline" right={<span style={{ fontSize: 11, fontFamily: 'JetBrains Mono', color: data.headline.length > 80 ? 'var(--danger-500)' : 'var(--text-tertiary)' }}>{data.headline.length}/80</span>}>
          <MOInput value={data.headline} onChange={e => update({ headline: e.target.value.slice(0, 80) })} placeholder="e.g. CS Professor at IIT Delhi · Algorithms · DP"/>
        </MOLabeled>
        <MOLabeled label="Short bio" right={
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button onClick={aiHelp} disabled={aiSuggesting} className="btn btn-ghost btn-sm" style={{ height: 26, padding: '0 10px', fontSize: 11 }}>
              {aiSuggesting ? <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}><span className="nova-dot"/><span className="nova-dot"/><span className="nova-dot"/></span> : <>✨ AI Help me write</>}
            </button>
            <span style={{ fontSize: 11, fontFamily: 'JetBrains Mono', color: data.bio.length > 500 ? 'var(--danger-500)' : 'var(--text-tertiary)' }}>{data.bio.length}/500</span>
          </div>
        }>
          <textarea value={data.bio} onChange={e => update({ bio: e.target.value.slice(0, 500) })}

              background: 'var(--bg-surface)', border: '1.5px solid var(--border-default)',
              borderRadius: 12, fontSize: 14, fontFamily: 'Inter', color: 'var(--text-primary)',
              resize: 'vertical', lineHeight: 1.55,
            }}/>
        </MOLabeled>
      </div>

      <button onClick={next} disabled={!can} className="btn btn-brand btn-lg" style={{ width: '100%', marginTop: 24, opacity: can ? 1 : 0.5, background: 'var(--gradient-brand)' }}>

            <button onClick={() => setShowCrop(false)} className="btn btn-brand btn-md" style={{ width: '100%', background: 'var(--gradient-brand)' }}>Use this photo</button>

// ── STEP 3: Expertise ──
const MOStep3 = ({ data, update, next }) => {
  const [draft, setDraft] = useStateMO('');
  const addSubject = (s) => {
    const v = (s || draft).trim();
    if (!v || data.subjects.length >= 10 || data.subjects.includes(v)) return;
    update({ subjects: [...data.subjects, v], levelsBySubject: { ...data.levelsBySubject, [v]: ['Intermediate'] } });
    setDraft('');
  };
  const removeSubject = (s) => {
    const next = { ...data.levelsBySubject }; delete next[s];
    update({ subjects: data.subjects.filter(x => x !== s), levelsBySubject: next });
  };
  const toggleLevel = (s, lvl) => {
    const cur = data.levelsBySubject[s] || [];
    const nxt = cur.includes(lvl) ? cur.filter(x => x !== lvl) : [...cur, lvl];
    update({ levelsBySubject: { ...data.levelsBySubject, [s]: nxt } });
  };
  const langs = [
    { f: '🇮🇳', n: 'Hindi' }, { f: '🇮🇳', n: 'Tamil' }, { f: '🇮🇳', n: 'Telugu' },
    { f: '🌐', n: 'English' }, { f: '🇩🇪', n: 'German' }, { f: '🇫🇷', n: 'French' }, { f: '🇪🇸', n: 'Spanish' },
  ];
  const toggleLang = (n) => {
    const has = data.languages.includes(n);
    update({ languages: has ? data.languages.filter(x => x !== n) : [...data.languages, n] });
  };

  return (
    <>
      <h2 className="font-display" style={{ fontFamily: 'Fraunces', fontSize: 26, fontWeight: 700, marginBottom: 6 }}>Your expertise</h2>
      <p style={{ fontSize: 13, color: 'var(--text-tertiary)', marginBottom: 20 }}>What can students book you to teach?</p>

      <MOLabeled label="Primary field">
        <MOSelect value={data.primary} onChange={e => update({ primary: e.target.value })}>
          {moExpertiseOptions.map(o => <option key={o}>{o}</option>)}
        </MOSelect>
      </MOLabeled>

      <div style={{ marginTop: 16 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>Subjects you teach</label>
          <span style={{ fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono' }}>{data.subjects.length}/10</span>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 8 }}>
          {data.subjects.map(s => (
            <span key={s} style={{
              display: 'inline-flex', alignItems: 'center', gap: 6, height: 30, padding: '0 8px 0 12px',
              background: 'var(--glass-brand-bg)', border: '1px solid var(--border-brand)',
              borderRadius: 999, fontSize: 12, fontWeight: 500, color: 'var(--brand-700)',
              animation: 'modalIn 240ms var(--ease-out-expo)',
            }}>
              {s}
              <button onClick={() => removeSubject(s)} style={{ color: 'var(--brand-500)', display: 'inline-flex' }}><Icon name="x" size={11}/></button>
            </span>
          ))}
        </div>
        <input value={draft} onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addSubject(); } }}
          placeholder="Type a subject and press Enter (e.g. Algorithms)"
          style={{ width: '100%', height: 40, padding: '0 14px', background: 'var(--bg-surface)', border: '1.5px solid var(--border-default)', borderRadius: 10, fontSize: 13 }}
        />

        {data.subjects.length > 0 && (
          <div style={{ marginTop: 12, padding: 14, background: 'var(--bg-base)', borderRadius: 12, border: '1px solid var(--border-subtle)' }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 10 }}>Levels per subject</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {data.subjects.map(s => (
                <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{s}</span>
                  <div style={{ display: 'flex', gap: 4 }}>
                    {['Beginner','Intermediate','Advanced'].map(lvl => {
                      const sel = (data.levelsBySubject[s] || []).includes(lvl);
                      return (
                        <button key={lvl} onClick={() => toggleLevel(s, lvl)} style={{
                          height: 26, padding: '0 10px', borderRadius: 999, fontSize: 11, fontWeight: 600,
                          background: sel ? 'var(--gradient-brand)' : 'var(--bg-surface)',
                          color: sel ? '#fff' : 'var(--text-secondary)',
                          border: '1px solid ' + (sel ? 'transparent' : 'var(--border-default)'),
                        }}>{lvl}</button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{ marginTop: 18 }}>
        <label style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 6, display: 'block' }}>Teaching languages</label>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {langs.map(l => {
            const sel = data.languages.includes(l.n);
            return (
              <button key={l.n} onClick={() => toggleLang(l.n)} style={{
                display: 'inline-flex', alignItems: 'center', gap: 6, height: 32, padding: '0 12px', borderRadius: 999, fontSize: 12, fontWeight: 500,
                background: sel ? 'var(--gradient-brand)' : 'var(--bg-surface)',
                color: sel ? '#fff' : 'var(--text-secondary)',
                border: '1px solid ' + (sel ? 'transparent' : 'var(--border-default)'),
              }}><span>{l.f}</span> {l.n}</button>
            );
          })}
        </div>
      </div>

      <MOInlineList
        title="Education" addLabel="+ Add Education"
        items={data.education}
        cols={['Degree', 'Institution', 'Year']}
        onChange={(items) => update({ education: items })}
      />
      <MOInlineList
        title="Certifications (optional)" addLabel="+ Add Certification"
        items={data.certs} cols={['Name', 'Issuer', 'Year']}
        showUpload onChange={(items) => update({ certs: items })}
      />

      <MOLabeled label="LinkedIn URL"><MOInput value={data.linkedin} onChange={e => update({ linkedin: e.target.value })} placeholder="https://linkedin.com/in/…"/></MOLabeled>

      <button onClick={next} disabled={data.subjects.length === 0} className="btn btn-brand btn-lg" style={{ width: '100%', marginTop: 22, opacity: data.subjects.length === 0 ? 0.5 : 1, background: 'var(--gradient-brand)' }}>
        Continue <Icon name="chevronR" size={14}/>
      </button>
    </>
  );
};

const MOInlineList = ({ title, addLabel, items, cols, showUpload, onChange }) => {
  const add = () => onChange([...items, Object.fromEntries(cols.map(c => [c.toLowerCase(), '']))]);
  const remove = (i) => onChange(items.filter((_, k) => k !== i));
  const set = (i, key, v) => onChange(items.map((it, k) => k === i ? { ...it, [key]: v } : it));
  return (
    <div style={{ marginTop: 18 }}>

const toast = (msg) => {
  const id = 'eo-toast-' + Date.now();
  const el = document.createElement('div');
  el.id = id;
  el.textContent = msg;
  el.style.cssText = `
    position:fixed; right:24px; bottom:32px; z-index:9999;
    background: var(--bg-elevated, #fff);
    color: var(--text-primary);
    padding: 12px 18px; border-radius: 14px;

    box-shadow: var(--shadow-lg, 0 10px 30px rgba(0,0,0,0.15));
    font: 500 14px Inter, sans-serif;
    transform: translateX(20px); opacity: 0;
    transition: all 280ms cubic-bezier(.16,1,.3,1);
  `;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.transform = 'translateX(0)'; el.style.opacity = '1'; });
  setTimeout(() => { el.style.transform = 'translateX(20px)'; el.style.opacity = '0'; setTimeout(() => el.remove(), 320); }, 2600);

const MySessions = ({ user, navigate, openBooking }) => {
  const [filter, setFilter] = useState('upcoming');
  const [sessions, setSessions] = useState(buildSessions);
  const [menuId, setMenuId] = useState(null);
  const [modal, setModal] = useState(null); // {kind, session}
  const [agendaOpen, setAgendaOpen] = useState(null);

  const counts = {
    upcoming: sessions.filter(s => s.status === 'upcoming').length,
    past: sessions.filter(s => s.status === 'past').length,
    cancelled: sessions.filter(s => s.status === 'cancelled').length,
  };
  const list = sessions.filter(s => s.status === filter);

  return (
    <div className="page fade-in">
      <div style={{ marginBottom: 22 }}>
        <h1 className="font-display" style={{ fontSize: 38, fontWeight: 500 }}>My sessions</h1>
        <p style={{ color: 'var(--text-secondary)', fontSize: 14, marginTop: 6 }}>Your upcoming and past 1-on-1 sessions.</p>
      </div>

      <div style={{ display: 'flex', gap: 6, marginBottom: 24, flexWrap: 'wrap' }}>
        {[['upcoming','Upcoming'],['past','Past'],['cancelled','Cancelled']].map(([k, l]) => (
          <button key={k} onClick={() => setFilter(k)} className={`chip ${filter === k ? 'active' : ''}`}>
            {l} ({counts[k]})
          </button>
        ))}
      </div>

      {list.length === 0 ? (
        <EmptyState
          icon="📅"
          title={filter === 'upcoming' ? 'No upcoming sessions' : filter === 'past' ? 'Your session history will appear here' : 'No cancellations — keep that streak going'}
          desc={filter === 'upcoming' ? 'Book a mentor to start learning 1-on-1' : ''}
          cta={filter === 'upcoming' ? { label: 'Find a Mentor', onClick: () => navigate('mentors') } : null}
        />
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {list.map(s => (
            <SessionCard key={s.id} session={s} agendaOpen={agendaOpen === s.id} setAgendaOpen={(v) => setAgendaOpen(v ? s.id : null)}
              menuOpen={menuId === s.id} setMenuOpen={(v) => setMenuId(v ? s.id : null)}
              onJoin={() => navigate('room', { id: 'mentor-' + s.id, topic: s.topic, subject: s.mentor.subject, host: s.mentor.name, participants: 2, max: 2, duration: '0m', vibe: 'focus', type: 'mentor-session' })}
              onReschedule={() => { setMenuId(null); setModal({ kind: 'reschedule', session: s }); }}
              onCancel={() => { setMenuId(null); setModal({ kind: 'cancel', session: s }); }}
              onReview={() => setModal({ kind: 'review', session: s })}
              onRebook={() => openBooking(s.mentor)}
            />
          ))}
        </div>
      )}

      {modal && <SessionModal modal={modal} onClose={() => setModal(null)}
        onResched={(d) => { setSessions(ss => ss.map(x => x.id === modal.session.id ? { ...x, date: d, countdown: 'rescheduled' } : x)); setModal(null); toast('Rescheduled to ' + d + ' ✓'); }}
        onConfirmCancel={() => { setSessions(ss => ss.map(x => x.id === modal.session.id ? { ...x, status: 'cancelled', refund: 'Pending refund' } : x)); setModal(null); toast('Session cancelled, refund processing'); }}
        onSubmitReview={(stars) => { setSessions(ss => ss.map(x => x.id === modal.session.id ? { ...x, reviewed: true, reviewStars: stars } : x)); setModal(null); toast('Thanks for your review ✓'); }}
      />}
    </div>
  );
};

const SessionCard = ({ session: s, menuOpen, setMenuOpen, agendaOpen, setAgendaOpen, onJoin, onReschedule, onCancel, onReview, onRebook }) => {
  const isUpcoming = s.status === 'upcoming';
  const isCancelled = s.status === 'cancelled';
  const isPast = s.status === 'past';
  const joinActive = isUpcoming && s.countdown && s.countdown.includes('min');
  const countdownColor = !s.countdown ? null : s.countdown.includes('min') ? 'var(--gradient-brand, var(--brand-500))' : s.countdown.includes('hour') ? 'var(--amber-500)' : 'var(--mint-500)';

  return (
    <div className="card" style={{
      padding: 18, display: 'flex', flexDirection: 'column', gap: 12,
      opacity: isCancelled ? 0.7 : isPast ? 0.86 : 1,
      borderLeft: isPast ? '3px solid var(--text-tertiary)' : isCancelled ? '3px solid var(--rose-400, var(--text-tertiary))' : '1px solid var(--border-subtle)',
    }}>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
        <Avatar name={s.mentor.name} size={52}/>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: 'Inter', fontWeight: 600, fontSize: 15, textDecoration: isCancelled ? 'line-through' : 'none' }}>{s.topic}</div>
          <div style={{ color: 'var(--text-secondary)', fontSize: 12, marginTop: 3 }}>
            with {s.mentor.name} · {s.date} · {s.time} · {s.duration}min <Icon name={s.type === 'video' ? 'mentors' : 'mic'} size={11}/>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8, position: 'relative' }}>
          {isUpcoming && s.countdown && (
            <span style={{ fontSize: 11, fontFamily: 'Inter', fontWeight: 600, padding: '4px 10px', borderRadius: 999, background: typeof countdownColor === 'string' && countdownColor.includes('gradient') ? countdownColor : 'transparent', backgroundColor: typeof countdownColor === 'string' && !countdownColor.includes('gradient') ? countdownColor : undefined, color: '#fff' }}>{s.countdown}</span>
          )}
          {isCancelled && (
            <span className="chip chip-sm" style={{ color: s.refund.includes('Pending') ? 'var(--amber-600)' : 'var(--mint-600)' }}>{s.refund}</span>
          )}
          {isUpcoming && (
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={onJoin} disabled={!joinActive} className="btn btn-primary btn-sm" title={joinActive ? '' : 'Available 15 min before start'} style={{ opacity: joinActive ? 1 : 0.5 }}>Join Session</button>
              <button onClick={() => setAgendaOpen(!agendaOpen)} className="btn btn-ghost btn-sm">View Agenda</button>
              <button onClick={() => setMenuOpen(!menuOpen)} className="btn btn-ghost btn-sm" style={{ padding: '0 10px' }}>⋯</button>
              {menuOpen && (
                <div style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, background: 'var(--bg-surface)', border: '1px solid var(--border-default)', borderRadius: 12, padding: 6, minWidth: 180, boxShadow: 'var(--shadow-lg)', zIndex: 10 }}>
                  <button onClick={onReschedule} style={menuBtn}>Reschedule</button>
                  <button onClick={onCancel} style={{ ...menuBtn, color: 'var(--rose-500, var(--text-primary))' }}>Cancel with message</button>
                </div>
              )}
            </div>
          )}
          {isPast && (
            <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
              {s.reviewed ? (
                <span style={{ fontSize: 12, color: 'var(--mint-600)' }}>★ {s.reviewStars} · Reviewed</span>
              ) : (
                <button onClick={onReview} className="btn btn-primary btn-sm">Leave Review</button>
              )}
              <button onClick={onRebook} className="btn btn-ghost btn-sm">Book Again</button>
            </div>
          )}
        </div>
      </div>
      {agendaOpen && s.agenda && (
        <div className="fade-in" style={{ padding: 12, background: 'var(--bg-hover)', borderRadius: 10, fontSize: 13, color: 'var(--text-secondary)' }}>
          <span className="label-sm" style={{ marginRight: 6 }}>Agenda</span>{s.agenda}
        </div>
      )}
    </div>
  );
};

const routeForNotif = (n) => {
  if (n.type === 'session') return 'my-sessions';
  if (n.type === 'community') return 'community';
  if (n.title.toLowerCase().includes('badge')) return 'profile';
  if (n.title.toLowerCase().includes('report')) return 'productivity';
  return 'home';

let _notifStore = null;
const useNotifications = () => {
  const [list, setList] = useState(() => {
    if (_notifStore) return _notifStore;
    try { const saved = JSON.parse(localStorage.getItem('elmorigin:notifs') || 'null'); _notifStore = saved || NOTIFICATIONS_SEED; }
    catch { _notifStore = NOTIFICATIONS_SEED; }
    return _notifStore;
  });
  useEffect(() => { _notifStore = list; localStorage.setItem('elmorigin:notifs', JSON.stringify(list)); }, [list]);
  return [list, setList];
};

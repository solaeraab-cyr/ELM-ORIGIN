<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elm Origin — Learn. Connect. Evolve.</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════
   ELM ORIGIN — Light, Minimal, Premium
   ═══════════════════════════════════════ */

:root {
  /* Foundation — Cool soft white tinted toward brand */
  --bg-base: #F8F9FF;
  --bg-surface: #FFFFFF;
  --bg-elevated: #FFFFFF;
  --bg-hover: #EEF0FF;
  --bg-subtle: #EEF0FF;
  --bg-sidebar: #F0F2FF;

  /* Brand — Elm Origin Navy */
  --brand-800: #0D1757;
  --brand-700: #142070;
  --brand-600: #1B2B8E;   /* PRIMARY */
  --brand-500: #2236B0;
  --brand-400: #3D52CC;
  --brand-300: #7B8FE8;
  --brand-200: #B8C4F4;
  --brand-100: #D6DCFF;
  --brand-50:  #EEF0FF;

  /* Gold — Pro / premium ONLY */
  --gold-700: #92400E;
  --gold-600: #B45309;
  --gold-500: #F59E0B;
  --gold-400: #FBBF24;
  --gold-100: #FEF3C7;

  /* Mint (success, streaks, available) */
  --mint-700: #047857;
  --mint-600: #059669;
  --mint-500: #10B981;
  --mint-400: #34D399;
  --mint-100: #D1FAE5;

  /* Danger */
  --danger-600: #BE123C;
  --danger-500: #E11D48;
  --danger-100: #FFE4E6;

  /* Legacy aliases (kept so existing screens don't break) */
  --amber-600: var(--gold-600);
  --amber-500: var(--gold-500);
  --amber-400: var(--gold-400);
  --amber-100: var(--gold-100);

  /* Text */
  --text-primary: #0D1757;
  --text-secondary: #475569;
  --text-tertiary: #94A3B8;
  --text-muted: #B5BACB;
  --text-inverse: #FFFFFF;

  /* Borders */
  --border-subtle: #DDE1FF;
  --border-default: #BBC3F0;
  --border-strong: #7B8FE8;
  --border-brand: rgba(27,43,142,0.40);
  --border-glow: rgba(27,43,142,0.24);

  /* Gradients */
  --gradient-brand: linear-gradient(135deg, #0D1757 0%, #3D52CC 100%);
  --gradient-brand-warm: linear-gradient(135deg, #1B2B8E 0%, #F59E0B 100%);
  --gradient-ai: linear-gradient(135deg, #10B981 0%, #3D52CC 100%);

  /* Surfaces */
  --glass-1-bg: #FFFFFF;
  --glass-2-bg: #FFFFFF;
  --glass-3-bg: #FFFFFF;
  --glass-brand-bg: rgba(27,43,142,0.06);
  --glass-ai-bg: rgba(16,185,129,0.06);
  --glass-amber-bg: rgba(245,158,11,0.06);

  /* Radius */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 28px;

  /* Elevation */
  --shadow-xs: 0 1px 3px rgba(13,23,87,0.08);
  --shadow-sm: 0 2px 8px rgba(13,23,87,0.10);
  --shadow-md: 0 4px 20px rgba(13,23,87,0.12);
  --shadow-lg: 0 12px 36px rgba(13,23,87,0.14);
  --shadow-xl: 0 20px 60px rgba(13,23,87,0.18);
  --shadow-brand: 0 8px 28px rgba(27,43,142,0.30), 0 2px 8px rgba(13,23,87,0.18);
  --shadow-ai: 0 8px 28px rgba(16,185,129,0.18), 0 2px 8px rgba(16,185,129,0.10);
  --shadow-gold: 0 8px 28px rgba(245,158,11,0.30);

  /* Easing */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-in-expo: cubic-bezier(0.7, 0, 0.84, 0);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg-base: #070D28;
  --bg-surface: #0F1A3D;
  --bg-elevated: #142049;
  --bg-hover: rgba(123,143,232,0.10);
  --bg-subtle: #111D42;
  --bg-sidebar: #090F2E;

  --text-primary: #E8ECFF;
  --text-secondary: #94A3B8;
  --text-tertiary: #64748B;
  --text-muted: #475569;

  --border-subtle: rgba(123,143,232,0.14);
  --border-default: rgba(123,143,232,0.22);
  --border-strong: rgba(123,143,232,0.40);

  --brand-50: rgba(123,143,232,0.10);
  --brand-100: rgba(123,143,232,0.18);

  --shadow-xs: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.5);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.6);
  --shadow-lg: 0 12px 36px rgba(0,0,0,0.65);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.72);

  --glass-brand-bg: rgba(123,143,232,0.10);
  --glass-ai-bg: rgba(16,185,129,0.10);
  --glass-amber-bg: rgba(245,158,11,0.10);
}

html { transition: background-color 400ms var(--ease-smooth), color 400ms var(--ease-smooth); }
body, .card, .sidebar, .topbar, .nav-item, .chip, button, input, textarea, .modal-in {
  transition:
    background-color 320ms var(--ease-smooth),
    border-color 320ms var(--ease-smooth),
    color 240ms var(--ease-smooth),
    box-shadow 240ms var(--ease-smooth);
}

[data-reduce-motion="true"] *, [data-reduce-motion="true"] *::before, [data-reduce-motion="true"] *::after {
  animation-duration: 0.01ms !important;
  animation-iteration-count: 1 !important;
  transition-duration: 0.01ms !important;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}

body {
  background:
    radial-gradient(ellipse 900px 500px at 90% -5%, rgba(42,63,184,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 800px 600px at 0% 100%, rgba(16,185,129,0.03) 0%, transparent 60%),
    var(--bg-base);
  background-attachment: fixed;
}

#root { min-height: 100vh; }

/* Typography */
.font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
.font-heading { font-family: 'Inter', system-ui, sans-serif; letter-spacing: -0.01em; font-weight: 600; }
.font-body { font-family: 'Inter', system-ui, sans-serif; }
.font-mono { font-family: 'JetBrains Mono', monospace; }
.italic { font-style: italic; }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(14,18,40,0.08); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(14,18,40,0.16); }

/* Focus */
button:focus-visible, input:focus-visible, textarea:focus-visible, [role="button"]:focus-visible {
  outline: 2px solid var(--brand-400);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, textarea { font: inherit; color: inherit; background: transparent; border: none; outline: none; }
a { color: inherit; text-decoration: none; }

/* ─── Buttons ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: 'Figtree'; font-weight: 600; letter-spacing: -0.01em;
  border-radius: 999px;
  transition: transform 200ms var(--ease-smooth), background 220ms var(--ease-smooth), box-shadow 220ms var(--ease-smooth), border-color 220ms var(--ease-smooth), color 200ms var(--ease-smooth);
  cursor: pointer;
  white-space: nowrap;
  will-change: transform;
}
.btn:active { transform: scale(0.97); }
.btn-xs { height: 30px; font-size: 12px; padding: 0 12px; }
.btn-sm { height: 36px; font-size: 13px; padding: 0 16px; }
.btn-md { height: 44px; font-size: 14px; padding: 0 20px; }
.btn-lg { height: 52px; font-size: 15px; padding: 0 26px; }
.btn-xl { height: 60px; font-size: 16px; padding: 0 32px; }

.btn-primary {
  background: var(--text-primary);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover { background: #1C2140; transform: translateY(-1px); box-shadow: var(--shadow-md); }

.btn-brand {
  background: var(--gradient-brand);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn-brand:hover { box-shadow: var(--shadow-brand); transform: translateY(-1px); }

.btn-ghost {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border-default);
}
.btn-ghost:hover { background: var(--bg-hover); border-color: var(--border-strong); transform: translateY(-1px); }

.btn-text {
  color: var(--brand-500);
  background: transparent;
  padding: 0 4px;
}
.btn-text:hover { color: var(--brand-600); }

.btn-ai {
  background: var(--gradient-ai);
  color: #fff;
  box-shadow: var(--shadow-sm);
}
.btn-ai:hover { box-shadow: var(--shadow-ai); transform: translateY(-1px); }

/* ─── Chips ─── */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 12px;
  border-radius: 999px;
  font-family: 'Figtree'; font-weight: 500; font-size: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  color: var(--text-secondary);
  transition: all 180ms var(--ease-smooth);
  cursor: pointer;
}
.chip.chip-sm { height: 24px; font-size: 11px; padding: 0 10px; }
.chip:hover { background: var(--bg-hover); border-color: var(--border-strong); color: var(--text-primary); transform: translateY(-1px); }
.chip.active, .chip.active-solid {
  background: var(--text-primary);
  color: #fff;
  border-color: var(--text-primary);
}
.chip.chip-mint { color: var(--mint-700); border-color: rgba(16,185,129,0.25); background: rgba(16,185,129,0.08); }
.chip.chip-amber { color: var(--amber-600); border-color: rgba(217,119,6,0.25); background: rgba(217,119,6,0.08); }
.chip.chip-brand { color: var(--brand-600); border-color: rgba(42,63,184,0.22); background: rgba(42,63,184,0.06); }

/* ─── Labels ─── */
.label-lg { font-family: 'Figtree'; font-weight: 600; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
.label-md { font-family: 'Figtree'; font-weight: 600; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
.label-sm { font-family: 'Figtree'; font-weight: 600; font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--text-tertiary); }

/* ─── Cards ─── */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 24px;
  transition: transform 280ms var(--ease-out-expo), box-shadow 280ms var(--ease-out-expo), border-color 280ms var(--ease-out-expo);
}
.card-hover { cursor: pointer; }
.card-hover:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-strong);
}
.card-hover-featured:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-xl);
  border-color: var(--border-brand);
}

/* Glass / Surfaces — flatten to white in light mode */
.glass-1, .glass-2, .glass-3 {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
}

/* ─── Avatar ─── */
.avatar {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 999px;
  background: var(--gradient-brand);
  color: #fff;
  font-family: 'Figtree'; font-weight: 700;
  overflow: hidden;
  flex-shrink: 0;
}

/* ─── Status dot ─── */
.status-dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; }
.status-dot.green { background: var(--mint-500); box-shadow: 0 0 0 3px rgba(16,185,129,0.15); animation: pulse 2.2s infinite var(--ease-smooth); }
.status-dot.amber { background: var(--amber-500); }
.status-dot.gray { background: var(--text-muted); }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in-up { animation: fadeInUp 500ms var(--ease-out-expo) both; }

@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.fade-in { animation: fadeIn 400ms var(--ease-smooth) both; }

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-in { animation: modalIn 350ms var(--ease-out-expo) both; }

@keyframes slideInRight {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.slide-in-right { animation: slideInRight 500ms var(--ease-out-expo) both; }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }

@keyframes novaTypingDot {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}
.nova-dot {
  width: 6px; height: 6px; border-radius: 999px; background: var(--mint-500);
  display: inline-block;
  animation: novaTypingDot 900ms infinite var(--ease-smooth);
}
.nova-dot:nth-child(2) { animation-delay: 150ms; }
.nova-dot:nth-child(3) { animation-delay: 300ms; }

@keyframes novaOrb {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.nova-orb {
  background: var(--gradient-ai);
  border-radius: 999px;
  position: relative;
  animation: novaOrb 14s linear infinite;
  box-shadow: 0 0 32px rgba(16,185,129,0.30);
}
.nova-orb::after {
  content: '';
  position: absolute; inset: 15%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), transparent 55%);
  border-radius: 999px;
}

/* Inputs */
.input {
  height: 46px;
  padding: 0 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Instrument Sans';
  font-size: 14px;
  transition: all 200ms var(--ease-smooth);
  width: 100%;
}
.input:hover { border-color: var(--border-strong); }
.input:focus { border-color: var(--brand-500); box-shadow: 0 0 0 4px rgba(42,63,184,0.12); }
.input::placeholder { color: var(--text-muted); }

.textarea {
  padding: 14px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: 'Instrument Sans';
  font-size: 14px;
  transition: all 200ms var(--ease-smooth);
  width: 100%;
  resize: none;
  line-height: 1.5;
}
.textarea:focus { border-color: var(--brand-500); box-shadow: 0 0 0 4px rgba(42,63,184,0.12); }

/* Toggle */
.toggle-row {
  display: inline-flex;
  padding: 4px;
  background: var(--bg-subtle);
  border-radius: 999px;
  gap: 2px;
}
.toggle-row button {
  height: 36px;
  padding: 0 18px;
  font-family: 'Figtree'; font-weight: 600; font-size: 13px;
  color: var(--text-secondary);
  border-radius: 999px;
  transition: all 220ms var(--ease-smooth);
}
.toggle-row button:hover { color: var(--text-primary); }
.toggle-row button.active {
  background: var(--bg-surface);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

/* Divider */
.divider { height: 1px; background: var(--border-subtle); }

/* Utility */
.w-full { width: 100%; }
.h-full { height: 100%; }
.text-primary { color: var(--text-primary); }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.text-muted { color: var(--text-muted); }
.text-brand { color: var(--brand-500); }
.text-mint { color: var(--mint-600); }
.text-amber { color: var(--amber-600); }

.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

/* Stagger helper */
.stagger-in > * { opacity: 0; animation: fadeInUp 500ms var(--ease-out-expo) forwards; }
.stagger-in > *:nth-child(1) { animation-delay: 40ms; }
.stagger-in > *:nth-child(2) { animation-delay: 100ms; }
.stagger-in > *:nth-child(3) { animation-delay: 160ms; }
.stagger-in > *:nth-child(4) { animation-delay: 220ms; }
.stagger-in > *:nth-child(5) { animation-delay: 280ms; }
.stagger-in > *:nth-child(6) { animation-delay: 340ms; }
.stagger-in > *:nth-child(7) { animation-delay: 400ms; }
.stagger-in > *:nth-child(8) { animation-delay: 460ms; }

/* Layout */
.page { padding: 40px 56px; max-width: 1280px; margin: 0 auto; animation: fadeInUp 500ms var(--ease-out-expo); }
@media (max-width: 900px) { .page { padding: 24px 20px; } }

.main-scroll { flex: 1; overflow-y: auto; height: 100vh; }

/* Hover lift helper */
.lift { transition: transform 280ms var(--ease-out-expo), box-shadow 280ms var(--ease-out-expo); }
.lift:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

/* Interviews — matching animation */
@keyframes matchPulse {
  0%   { transform: scale(0.6); opacity: 0.9; }
  100% { transform: scale(1.4); opacity: 0; }
}
@keyframes matchSpring {
  0%   { transform: scale(0.3); opacity: 0; }
  60%  { transform: scale(1.08); opacity: 1; }
  100% { transform: scale(1); }
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.85; }
  50%      { opacity: 1; }
}
@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.55; transform: scale(0.85); }
}
@keyframes blink {
  0%, 49%   { opacity: 1; }
  50%, 100% { opacity: 0; }
}

/* Landing page animations */
@keyframes floatBadge {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes pulseRing {
  0%   { box-shadow: 0 0 0 0 rgba(27,43,142,0.45); }
  70%  { box-shadow: 0 0 0 14px rgba(27,43,142,0); }
  100% { box-shadow: 0 0 0 0 rgba(27,43,142,0); }
}
@keyframes marqueeScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@keyframes orbit {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes tileGlow {
  0%, 100% { box-shadow: 0 0 0 1px rgba(123,143,232,0.20), 0 8px 24px rgba(13,23,87,0.40); }
  50%      { box-shadow: 0 0 0 2px rgba(123,143,232,0.55), 0 12px 36px rgba(27,43,142,0.55); }
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(640px) rotate(720deg); opacity: 0; }
}
@keyframes drawCheck {
  to { stroke-dashoffset: 0; }
}
@keyframes radarPulse {
  0%   { transform: scale(0.4); opacity: 1; }
  100% { transform: scale(1.6); opacity: 0; }
}
@keyframes slideInTop {
  from { transform: translateY(-20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
@keyframes encourageArc {
  0%   { transform: translate(0,0) scale(0.6); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translate(var(--arcX,120px), var(--arcY,-80px)) scale(1.4); opacity: 0; }
}

/* Landing page utilities */
.font-display { font-family: 'Fraunces', serif; letter-spacing: -0.02em; }
.section-tinted { background: var(--bg-subtle); }

.landing-nav {
  position: sticky; top: 0; z-index: 50;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 56px;
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid var(--border-subtle);
}
[data-theme="dark"] .landing-nav { background: rgba(7,13,40,0.78); }
@media (max-width: 767px) { .landing-nav { padding: 0 20px; } }

.landing-cta {
  height: 52px; padding: 0 26px;
  display: inline-flex; align-items: center; gap: 8px;
  border-radius: 999px;
  background: var(--brand-600); color: #fff;
  font-family: 'Inter'; font-weight: 600; font-size: 15px; letter-spacing: -0.01em;
  box-shadow: 0 8px 24px rgba(27,43,142,0.30);
  transition: transform 220ms var(--ease-spring), box-shadow 220ms var(--ease-smooth), background 220ms;
  cursor: pointer;
}
.landing-cta:hover { transform: translateY(-2px) scale(1.02); background: var(--brand-500); box-shadow: 0 14px 40px rgba(27,43,142,0.40); }
.landing-cta:active { transform: scale(0.98); }

.landing-cta-ghost {
  height: 52px; padding: 0 26px;
  display: inline-flex; align-items: center; gap: 8px;
  border-radius: 999px;
  background: transparent; color: var(--text-primary);
  border: 1px solid var(--border-default);
  font-family: 'Inter'; font-weight: 600; font-size: 15px;
  transition: all 220ms var(--ease-smooth);
  cursor: pointer;
}
.landing-cta-ghost:hover { background: var(--bg-hover); border-color: var(--border-strong); transform: translateY(-1px); }

/* Theme toggle pill */
.theme-pill {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 999px;
  background: var(--bg-subtle);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 220ms var(--ease-smooth);
}
.theme-pill:hover { color: var(--text-primary); background: var(--bg-hover); transform: scale(1.05); }

/* Marquee */
.marquee-track {
  display: flex; gap: 48px;
  width: max-content;
  animation: marqueeScroll 38s linear infinite;
}
.marquee-mask {
  overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
}

/* Hero study tile */
.studytile {
  position: relative;
  background: #050A1E;
  border-radius: 14px;
  overflow: hidden;
  aspect-ratio: 4 / 3;
  animation: tileGlow 4s ease-in-out infinite;
}

/* Float badge */
.float-badge {
  position: absolute;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--bg-surface);
  box-shadow: var(--shadow-md);
  font-size: 13px; font-weight: 600;
  border: 1px solid var(--border-subtle);
  animation: floatBadge 4s ease-in-out infinite;
}

/* Pricing card */
.price-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 24px;
  padding: 32px;
  transition: transform 280ms var(--ease-out-expo), box-shadow 280ms;
}
.price-card.featured {
  border: 1.5px solid var(--gold-500);
  background: linear-gradient(180deg, var(--gold-100) 0%, var(--bg-surface) 28%);
}
[data-theme="dark"] .price-card.featured {
  background: linear-gradient(180deg, rgba(245,158,11,0.10) 0%, var(--bg-surface) 28%);
}
.price-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }

/* Pro chip */
.chip-gold {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 999px;
  background: var(--gold-100); color: var(--gold-700);
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
}

/* Responsive helpers */
.mobile-only { display: none; }
.desktop-only { display: block; }
@media (max-width: 767px) {
  .mobile-only { display: block; }
  .desktop-only { display: none; }
}
</style>

  );
};

// Nova orb
const NovaOrb = ({ size = 32 }) => (
  <div className="nova-orb" style={{ width: size, height: size }} />
);

// Avatar (colored gradient, initials)
const Avatar = ({ name = "?", size = 40, tint = 0 }) => {
  const initials = name.split(' ').map(n => n[0]).slice(0,2).join('').toUpperCase();
  const hues = [265, 220, 195, 160, 30, 320, 285, 210];
  const h = hues[(name.charCodeAt(0) + tint) % hues.length];
  return (
    <div className="avatar" style={{
      width: size, height: size, fontSize: size * 0.36,
      background: `linear-gradient(135deg, oklch(60% 0.18 ${h}), oklch(70% 0.14 ${h + 30}))`
    }}>
      {initials}
    </div>
  );
};

// Status ring wrapper
const StatusRing = ({ status = 'focus', size = 48, children }) => {
  const color = status === 'focus' ? 'var(--mint-500)' : status === 'break' ? 'var(--amber-400)' : 'var(--text-tertiary)';
  return (
    <div style={{
      width: size + 8, height: size + 8, borderRadius: 999,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: `inset 0 0 0 2px ${color}`,
    }}>{children}</div>
  );
};

// Progress bar
const Progress = ({ value = 0, max = 100, color = 'var(--gradient-brand)' }) => (
  <div style={{ height: 4, background: 'var(--bg-elevated)', borderRadius: 999, overflow: 'hidden' }}>
    <div style={{ height: '100%', width: `${(value/max)*100}%`, background: color, transition: 'width 400ms var(--ease-out-expo)' }}/>
  </div>
);

// Subject pill with icon glyph (original, not emoji slop — using small shapes)
const SubjectGlyph = ({ subject, size = 14 }) => {
  const map = {
    'Mathematics': { color: 'oklch(70% 0.15 265)', shape: '∫' },
    'Physics': { color: 'oklch(70% 0.13 220)', shape: '∿' },
    'Chemistry': { color: 'oklch(70% 0.14 160)', shape: '⚛' },
    'Biology': { color: 'oklch(70% 0.13 145)', shape: '✿' },
    'Computer Science': { color: 'oklch(70% 0.15 285)', shape: '{}' },
    'Data Science': { color: 'oklch(70% 0.14 30)', shape: '∑' },
    'Writing': { color: 'oklch(70% 0.12 40)', shape: '¶' },
    'History': { color: 'oklch(70% 0.12 60)', shape: '§' },
    'Business': { color: 'oklch(70% 0.13 90)', shape: '◆' },
    'Design': { color: 'oklch(70% 0.14 320)', shape: '◇' },
    'Medicine': { color: 'oklch(70% 0.14 15)', shape: '＋' },
    'Languages': { color: 'oklch(70% 0.13 195)', shape: 'あ' },
  };
  const m = map[subject] || { color: 'var(--brand-400)', shape: '●' };
  return <span style={{ color: m.color, fontFamily: 'JetBrains Mono', fontSize: size, fontWeight: 600 }}>{m.shape}</span>;
};

Object.assign(window, { Icon, NovaOrb, Avatar, StatusRing, Progress, SubjectGlyph });

  </script>

const { useState: useStateL, useEffect: useEffectL, useRef: useRefL } = React;

// ═══════════════════════════════════════
// ELM ORIGIN — LANDING PAGE
// Spec: scrollable marketing page, fixed nav, hero + 7 sections + footer

  const [scrolled, setScrolled] = useStateL(false);
  const [mobileMenu, setMobileMenu] = useStateL(false);

  useEffectL(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div style={{ background: 'var(--bg-base)', color: 'var(--text-primary)', minHeight: '100vh', overflowX: 'hidden' }}>
      <LandingNav scrolled={scrolled} navigate={navigate} mobileMenu={mobileMenu} setMobileMenu={setMobileMenu} theme={theme} setTheme={setTheme}/>

      <ProblemSection/>
      <FeaturesSection/>
      <HowItWorks/>
      <MentorShowcase/>
      <Testimonials/>
      <PricingPreview navigate={navigate}/>
      <FinalCTA navigate={navigate}/>
      <Footer/>
    </div>
  );
};

// ─── Nav ──────────────────────────────────
const LandingNav = ({ scrolled, navigate, mobileMenu, setMobileMenu, theme, setTheme }) => {
  const dark = theme === 'dark';
  const links = [
    { label: 'Features', target: 'features' },
    { label: 'Mentors', target: 'mentors' },
    { label: 'Pricing', target: 'pricing' },
    { label: 'Community', target: 'community' },
  ];
  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setMobileMenu(false);
  };

  return (
    <>
      <nav style={{

  <script type="text/babel">
/* global React, Icon, Avatar */
const { useState, useEffect, useRef } = React;

// ═══════════════════════════════════════
// AUTH — Login, Signup (5 steps), Forgot, Reset

// ─── Shared shell ───
const AuthCard = ({ children, maxW = 480 }) => (

const ProgressBar = ({ step, total }) => (

);

const Field = ({ icon, type = 'text', value, onChange, placeholder, error, valid, rightSlot, autoFocus, onBlur }) => {
  const [focus, setFocus] = useState(false);
  const borderColor = error ? 'var(--danger-500)' : valid ? 'var(--mint-500)' : focus ? 'var(--brand-500)' : 'var(--border-default)';
  return (
    <div>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        height: 48, padding: '0 14px',
        background: 'var(--bg-surface)',
        border: '1.5px solid ' + borderColor,
        borderRadius: 12,
        transition: 'border-color 200ms, box-shadow 200ms',
        boxShadow: focus ? '0 0 0 4px ' + (error ? 'rgba(225,29,72,0.10)' : 'rgba(27,43,142,0.10)') : 'none',
      }}>
        {icon && <span style={{ color: 'var(--text-tertiary)' }}><Icon name={icon} size={16}/></span>}
        <input
          type={type} value={value} onChange={onChange}
          onFocus={() => setFocus(true)}
          onBlur={(e) => { setFocus(false); onBlur && onBlur(e); }}
          placeholder={placeholder} autoFocus={autoFocus}
          style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: 'var(--text-primary)', fontSize: 14 }}

        {valid && <span style={{ color: 'var(--mint-600)' }}><Icon name="check" size={16} stroke={2.5}/></span>}
        {error && <span style={{ color: 'var(--danger-500)' }}><Icon name="x" size={16} stroke={2.5}/></span>}

    ) : (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
    )}
    Continue with {provider === 'google' ? 'Google' : 'Apple'}
  </button>
);

const Divider = ({ text = 'or' }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '20px 0' }}>
    <div style={{ flex: 1, height: 1, background: 'var(--border-subtle)' }}/>

    <div style={{ flex: 1, height: 1, background: 'var(--border-subtle)' }}/>
  </div>
);

// ─── Password strength ───
const passwordStrength = (pw) => {
  if (!pw) return { score: 0, label: '', color: 'var(--bg-hover)' };
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw) && pw.length >= 12) score++;
  const map = [
    { score: 0, label: '', color: 'var(--bg-hover)' },
    { score: 1, label: 'Weak', color: 'var(--danger-500)' },
    { score: 2, label: 'Fair', color: 'var(--gold-500)' },
    { score: 3, label: 'Good', color: 'var(--mint-500)' },
    { score: 4, label: 'Strong', color: 'var(--brand-500)' },
  ];
  return map[score];
};

const StrengthMeter = ({ pw }) => {
  const { score, label, color } = passwordStrength(pw);
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: 'flex', gap: 4 }}>
        {[1,2,3,4].map(i => (
          <div key={i} style={{
            flex: 1, height: 3, borderRadius: 999,
            background: i <= score ? (i === 4 && score === 4 ? 'var(--gradient-brand)' : color) : 'var(--bg-hover)',
            transition: 'background 240ms var(--ease-smooth)'
          }}/>
        ))}
      </div>
      {label && <div style={{ fontSize: 11, marginTop: 4, color, fontWeight: 600 }}>{label}</div>}
    </div>
  );
};

// ═══════════════════════════════════════
// SIGNUP — 5 steps
// ═══════════════════════════════════════

const SignupFlow = ({ navigate, onComplete }) => {
  const [step, setStep] = useState(1);
  const [data, setData] = useState({
    name: '', email: '', password: '', emailValid: null,
    avatarIdx: 0, displayName: '', pronouns: '',
    subjects: [],
    studyHours: 3, prep: 'JEE', style: 'both',
  });

  const update = (patch) => setData(d => ({ ...d, ...patch }));

  if (step === 5) return <SignupWelcome data={data} onEnter={() => onComplete(data)}/>;

  return (
    <AuthCard>
      <ProgressBar step={step} total={5}/>
      {step > 1 && (
        <button onClick={() => setStep(s => s - 1)} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: 'var(--text-tertiary)', fontSize: 13, fontWeight: 500, marginBottom: 18 }}>
          <Icon name="chevronL" size={14}/> Back
        </button>
      )}
      {step === 1 && <SignupStep1 data={data} update={update} next={() => setStep(2)} navigate={navigate}/>}
      {step === 2 && <SignupStep2 data={data} update={update} next={() => setStep(3)}/>}
      {step === 3 && <SignupStep3 data={data} update={update} next={() => setStep(4)}/>}
      {step === 4 && <SignupStep4 data={data} update={update} next={() => setStep(5)}/>}
    </AuthCard>
  );
};

// ─── Step 1: Account ───
const SignupStep1 = ({ data, update, next, navigate }) => {
  const [showPw, setShowPw] = useState(false);
  const [emailErr, setEmailErr] = useState('');
  const [loading, setLoading] = useState(false);

  const validateEmail = (e) => {
    const v = e.target.value;
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    if (v && !ok) setEmailErr('Enter a valid email'); else setEmailErr('');
    update({ emailValid: v && ok });
  };

  const { score } = passwordStrength(data.password);
  const canSubmit = data.name.trim() && data.emailValid && score >= 2;

  const submit = () => {
    if (!canSubmit) return;
    setLoading(true);
    setTimeout(() => { setLoading(false); next(); }, 700);
  };

  return (
    <>
      <div style={{ marginBottom: 24 }}><Logo size={32}/></div>
      <h2 className="font-display" style={{ fontSize: 30, fontWeight: 700, marginBottom: 8 }}>Create your account</h2>
      <p style={{ fontSize: 14, color: 'var(--text-tertiary)', marginBottom: 24 }}>Join thousands of students learning together.</p>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 4 }}>
        <SocialButton provider="google"/>
        <SocialButton provider="apple"/>
      </div>
      <Divider/>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <Field icon="profile" placeholder="Full name" value={data.name} onChange={e => update({ name: e.target.value })}/>
        <Field icon="mail" type="email" placeholder="Email address" value={data.email}
          onChange={e => update({ email: e.target.value })} onBlur={validateEmail}
          valid={data.emailValid === true} error={emailErr}/>
        <div>
          <Field icon="settings" type={showPw ? 'text' : 'password'} placeholder="Password" value={data.password}
            onChange={e => update({ password: e.target.value })}
            rightSlot={
              <button type="button" onClick={() => setShowPw(s => !s)} style={{ color: 'var(--text-tertiary)' }}>
                <Icon name={showPw ? 'x' : 'check'} size={14}/>
              </button>
            }/>
          <StrengthMeter pw={data.password}/>
        </div>
      </div>

      <button onClick={submit} disabled={!canSubmit || loading} className="btn btn-brand btn-lg" style={{ width: '100%', marginTop: 24, opacity: !canSubmit ? 0.5 : 1, cursor: !canSubmit ? 'not-allowed' : 'pointer' }}>
        {loading ? <span style={{ width: 16, height: 16, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: 999, animation: 'orbit 800ms linear infinite' }}/> : <>Continue <Icon name="chevronR" size={14}/></>}
      </button>

      <p style={{ fontSize: 11, color: 'var(--text-muted)', textAlign: 'center', marginTop: 14, lineHeight: 1.5 }}>
        By continuing, you agree to our <a style={{ color: 'var(--brand-500)' }}>Terms</a> and <a style={{ color: 'var(--brand-500)' }}>Privacy Policy</a>.
      </p>
      <p style={{ fontSize: 13, color: 'var(--text-tertiary)', textAlign: 'center', marginTop: 18 }}>
        Already have an account? <a onClick={() => navigate('login')} style={{ color: 'var(--brand-500)', cursor: 'pointer', fontWeight: 600 }}>Log in</a>
      </p>
    </>
  );
};

// ─── Step 3: Subjects ───
const SignupStep3 = ({ data, update, next }) => {
  const SUBJECTS = ['Mathematics','Physics','Chemistry','Biology','Computer Science','Engineering','Economics','Business','Law','Medicine','Writing','History','Languages','Design','Psychology','Political Science','Data Science','Other'];
  const toggle = (s) => {
    const has = data.subjects.includes(s);
    if (has) update({ subjects: data.subjects.filter(x => x !== s) });
    else if (data.subjects.length < 3) update({ subjects: [...data.subjects, s] });
  };
  const full = data.subjects.length >= 3;

  return (
    <>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
        <h2 className="font-display" style={{ fontSize: 28, fontWeight: 700 }}>What are you studying?</h2>
        <span className="label-sm" style={{ fontSize: 11 }}>{data.subjects.length}/3 selected</span>
      </div>
      <p style={{ fontSize: 14, color: 'var(--text-tertiary)', marginBottom: 22 }}>Pick up to 3 subjects you want to focus on.</p>

      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 26 }}>
        {SUBJECTS.map(s => {
          const sel = data.subjects.includes(s);
          const dim = full && !sel;
          return (
            <button key={s} onClick={() => !dim && toggle(s)} style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              height: 36, padding: '0 14px',
              borderRadius: 999, fontSize: 13, fontWeight: 500,
              background: sel ? 'var(--gradient-brand)' : 'var(--bg-surface)',
              color: sel ? '#fff' : 'var(--text-secondary)',
              border: sel ? '1px solid transparent' : '1px solid var(--border-default)',
              opacity: dim ? 0.4 : 1,
              cursor: dim ? 'not-allowed' : 'pointer',
              transition: 'all 200ms var(--ease-smooth)',
              transform: sel ? 'scale(1.02)' : 'scale(1)',
              boxShadow: sel ? '0 4px 14px rgba(27,43,142,0.25)' : 'none'
            }}
              onMouseEnter={e => { if (!sel && !dim) e.currentTarget.style.borderColor = 'var(--border-brand)'; }}

const LoginPage = ({ navigate, onLogin }) => {
  const [role, setRole] = useState('student');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [err, setErr] = useState({});
  const [shake, setShake] = useState(false);
  const [attempts, setAttempts] = useState(0);
  const [loading, setLoading] = useState(false);
  const [lockedUntil, setLockedUntil] = useState(null);
  const [now, setNow] = useState(Date.now());

  useEffect(() => {
    if (lockedUntil) {
      const t = setInterval(() => setNow(Date.now()), 1000);
      return () => clearInterval(t);
    }
  }, [lockedUntil]);

  const remaining = lockedUntil ? Math.max(0, Math.ceil((lockedUntil - now) / 1000)) : 0;
  const isLocked = remaining > 0;
  const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
  const ss = String(remaining % 60).padStart(2, '0');

  const submit = () => {
    if (isLocked) return;
    setErr({});
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr({ email: 'Enter a valid email' }); return; }
    if (!pw) { setErr({ pw: 'Enter your password' }); return; }
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      // demo: any password "demo1234" succeeds, otherwise fail
      if (pw === 'demo1234' || pw.length >= 8) {
        onLogin(role === 'mentor');
      } else {
        const newAttempts = attempts + 1;
        setAttempts(newAttempts);
        setErr({ pw: 'Incorrect password' });
        setShake(true);
        setTimeout(() => setShake(false), 400);
        if (newAttempts >= 5) setLockedUntil(Date.now() + 5 * 60 * 1000);
      }
    }, 600);
  };

  return (
    <AuthCard>
      <div style={{ marginBottom: 24, textAlign: 'center' }}><Logo size={36}/></div>

      {/* Role toggle */}
      <div style={{ display: 'flex', padding: 4, background: 'var(--bg-subtle)', borderRadius: 999, marginBottom: 26, position: 'relative' }}>
        <div style={{
          position: 'absolute', top: 4, bottom: 4,
          width: 'calc(50% - 4px)',
          left: role === 'student' ? 4 : 'calc(50%)',
          background: 'var(--gradient-brand)', borderRadius: 999,
          transition: 'left 240ms var(--ease-spring)',
          boxShadow: '0 4px 14px rgba(27,43,142,0.30)'
        }}/>
        {['student', 'mentor'].map(r => (
          <button key={r} onClick={() => setRole(r)} style={{
            flex: 1, height: 40, position: 'relative', zIndex: 1,
            color: role === r ? '#fff' : 'var(--text-secondary)',
            fontSize: 13, fontWeight: 600, textTransform: 'capitalize',
            transition: 'color 200ms'
          }}>{r}</button>
        ))}
      </div>

      <h2 className="font-display" style={{ fontSize: 28, fontWeight: 700, marginBottom: 6 }}>
        {role === 'mentor' ? 'Mentor portal' : 'Welcome back'}
      </h2>
      <p style={{ fontSize: 14, color: 'var(--text-tertiary)', marginBottom: 24 }}>
        {role === 'mentor' ? 'Sign in to your mentor dashboard.' : 'Pick up where you left off.'}
      </p>

      {isLocked && (
        <div style={{ background: 'var(--gold-100)', border: '1px solid rgba(245,158,11,0.30)', color: 'var(--gold-700)', padding: '12px 14px', borderRadius: 12, fontSize: 13, marginBottom: 18, display: 'flex', alignItems: 'center', gap: 10 }}>
          <Icon name="x" size={16}/>
          <div style={{ flex: 1 }}>Too many attempts. Try again in <span style={{ fontFamily: 'JetBrains Mono', fontWeight: 600 }}>{mm}:{ss}</span></div>
        </div>
      )}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 14, animation: shake ? 'shake 360ms' : 'none' }}>
        <Field icon="mail" type="email" placeholder="Email address" value={email} onChange={e => { setEmail(e.target.value); setErr(p => ({ ...p, email: undefined })); }} error={err.email}/>
        <div>
          <Field icon="settings" type={showPw ? 'text' : 'password'} placeholder="Password" value={pw} onChange={e => { setPw(e.target.value); setErr(p => ({ ...p, pw: undefined })); }} error={err.pw}
            rightSlot={<button onClick={() => setShowPw(s => !s)} style={{ color: 'var(--text-tertiary)' }}><Icon name={showPw ? 'x' : 'check'} size={14}/></button>}/>
          <div style={{ marginTop: 8, textAlign: 'right' }}>
            <a onClick={() => navigate('forgot-password')} style={{ fontSize: 12, color: 'var(--brand-500)', cursor: 'pointer', fontWeight: 600 }}>Forgot password?</a>
          </div>
        </div>
      </div>

      <button onClick={submit} disabled={loading || isLocked} className="btn btn-brand btn-lg" style={{ width: '100%', marginTop: 22, opacity: isLocked ? 0.5 : 1 }}>
        {loading ? <span style={{ width: 16, height: 16, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: 999, animation: 'orbit 800ms linear infinite' }}/> : <>Log in <Icon name="chevronR" size={14}/></>}
      </button>

      <Divider/>
      <SocialButton provider="google"/>

      <p style={{ fontSize: 13, color: 'var(--text-tertiary)', textAlign: 'center', marginTop: 22 }}>

// ═══════════════════════════════════════
// RESET PASSWORD
// ═══════════════════════════════════════

const ResetPasswordPage = ({ navigate }) => {
  const [pw, setPw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [done, setDone] = useState(false);
  const [count, setCount] = useState(3);
  const [loading, setLoading] = useState(false);

  const match = pw && confirm && pw === confirm;
  const mismatch = confirm && pw !== confirm;
  const { score } = passwordStrength(pw);
  const canSubmit = score >= 2 && match;

  const submit = () => {
    if (!canSubmit) return;
    setLoading(true);
    setTimeout(() => { setLoading(false); setDone(true); }, 700);
  };

  useEffect(() => {
    if (!done) return;
    const t = setInterval(() => setCount(c => c - 1), 1000);
    const goto = setTimeout(() => navigate('login'), 3000);
    return () => { clearInterval(t); clearTimeout(goto); };
  }, [done]);

  return (
    <AuthCard>
      <div style={{ marginBottom: 24, textAlign: 'center' }}><Logo size={36}/></div>
      {!done ? (
        <>
          <h2 className="font-display" style={{ fontSize: 28, fontWeight: 700, marginBottom: 6, textAlign: 'center' }}>Set a new password</h2>
          <p style={{ fontSize: 14, color: 'var(--text-tertiary)', marginBottom: 24, textAlign: 'center' }}>Choose something strong — you'll use it from now on.</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <Field icon="settings" type={showPw ? 'text' : 'password'} placeholder="New password" value={pw} onChange={e => setPw(e.target.value)}
                rightSlot={<button onClick={() => setShowPw(s => !s)} style={{ color: 'var(--text-tertiary)' }}><Icon name={showPw ? 'x' : 'check'} size={14}/></button>}/>
              <StrengthMeter pw={pw}/>
            </div>
            <Field icon="settings" type={showPw ? 'text' : 'password'} placeholder="Confirm password" value={confirm} onChange={e => setConfirm(e.target.value)}
              valid={match} error={mismatch ? "Passwords don't match" : ''}/>
          </div>
          <button onClick={submit} disabled={!canSubmit || loading} className="btn btn-brand btn-lg" style={{ width: '100%', marginTop: 22, opacity: canSubmit ? 1 : 0.5 }}>
            {loading ? <span style={{ width: 16, height: 16, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: 999, animation: 'orbit 800ms linear infinite' }}/> : 'Reset password'}
          </button>
        </>
      ) : (
        <div style={{ textAlign: 'center', animation: 'fadeInUp 500ms var(--ease-spring)' }}>
          <div style={{
            width: 80, height: 80, borderRadius: 999,
            background: 'var(--gradient-ai)',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 20, color: '#fff',
            boxShadow: 'var(--shadow-ai)',
            animation: 'pulseRing 1.6s ease-out infinite'
          }}>
            <Icon name="check" size={42} stroke={3}/>
          </div>
          <h2 className="font-display italic" style={{ fontSize: 26, fontWeight: 700, marginBottom: 8 }}>Password updated!</h2>
          <p style={{ fontSize: 14, color: 'var(--text-tertiary)' }}>Redirecting to login in <span style={{ fontFamily: 'JetBrains Mono', color: 'var(--brand-600)', fontWeight: 600 }}>{Math.max(0, count)}…</span></p>
        </div>
      )}
    </AuthCard>
  );
};

window.SignupFlow = SignupFlow;
window.LoginPage = LoginPage;
window.ForgotPasswordPage = ForgotPasswordPage;
window.ResetPasswordPage = ResetPasswordPage;

  </script>

const NovaChat = ({ back }) => {

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [thread, loading]);

  const send = async (text) => {
    const content = text || msg;
    if (!content.trim() || loading) return;
    setMsg('');
    const newThread = [...thread, { role: 'user', content }];
    setThread(newThread);

    try {
      const res = await window.claude.complete({
        messages: [
          { role: 'user', content: `You are Nova, a concise, friendly AI tutor inside the Elm Origin app. Explain clearly, use short paragraphs, prefer worked examples. Keep answers under 180 words unless the student asks for more detail. Question: ${content}` }
        ],
      });
      setThread(t => [...t, { role: 'ai', content: res }]);
    } catch {
      setThread(t => [...t, { role: 'ai', content: "I couldn't reach the network. Try again in a moment." }]);
    }
    setLoading(false);
  };

  const suggestions = [
    'Explain eigenvalues like I\'m a first-year student',

/* global React, Icon, SubjectGlyph */
const { useState, useEffect } = React;

// ═══════════════════════════════════════
// PRODUCTIVITY — Pomodoro + Notes + Planner + Analytics (light, minimal)
// ═══════════════════════════════════════

// ─── FOCUS TIMER ─────────────────────────
const FocusTimer = () => {
  const [phase, setPhase] = useState('FOCUS');
  const durations = { FOCUS: 25*60, SHORT: 5*60, LONG: 15*60 };
  const [timeLeft, setTimeLeft] = useState(durations.FOCUS);
  const [running, setRunning] = useState(false);
  const total = durations[phase];

  useEffect(() => {
    if (!running) return;
    const t = setInterval(() => setTimeLeft(s => Math.max(0, s-1)), 1000);
    return () => clearInterval(t);
  }, [running]);

  useEffect(() => { setTimeLeft(durations[phase]); setRunning(false); }, [phase]);

  const progress = 1 - timeLeft / total;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '20px 0' }}>
      <div style={{ display: 'flex', gap: 4, padding: 4, background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', borderRadius: 999, marginBottom: 44 }}>
        {[['FOCUS','Focus · 25'], ['SHORT','Short · 5'], ['LONG','Long · 15']].map(([id, label]) => (
          <button key={id} onClick={() => setPhase(id)} style={{
            padding: '8px 18px', borderRadius: 999, fontSize: 13, fontFamily: 'Inter', fontWeight: 600,
            color: phase === id ? '#fff' : 'var(--text-secondary)',
            background: phase === id ? 'var(--text-primary)' : 'transparent',
            transition: 'all 220ms var(--ease-smooth)',
          }}>{label}</button>
        ))}
      </div>

      <TimerRing size={340} progress={progress} timeLeft={timeLeft}/>

      <div style={{ marginTop: 40, display: 'flex', gap: 14 }}>
        <button onClick={() => { setTimeLeft(total); setRunning(false); }}
          style={{ width: 48, height: 48, borderRadius: 999, background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', color: 'var(--text-secondary)', transition: 'all 220ms' }}
          onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.05)'; e.currentTarget.style.background = 'var(--bg-hover)'; }}
          onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.background = 'var(--bg-surface)'; }}
        ><Icon name="refresh" size={16}/></button>
        <button onClick={() => setRunning(r => !r)}
          style={{
            width: 68, height: 68, borderRadius: 999, background: 'var(--text-primary)', color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: 'var(--shadow-lg)', transition: 'all 220ms var(--ease-spring)',
          }}
          onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.05)'; }}
          onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; }}
        ><Icon name={running ? 'pause' : 'play'} size={22}/></button>
        <button
          style={{ width: 48, height: 48, borderRadius: 999, background: 'var(--bg-surface)', border: '1px solid var(--border-subtle)', color: 'var(--text-secondary)', transition: 'all 220ms' }}
          onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.05)'; e.currentTarget.style.background = 'var(--bg-hover)'; }}
          onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.background = 'var(--bg-surface)'; }}
        ><Icon name="chevronR" size={16}/></button>
      </div>

      <div style={{ marginTop: 48, display: 'flex', gap: 10, alignItems: 'center' }}>
        {[1,2,3,4].map(i => (
          <div key={i} style={{
            width: 10, height: 10, borderRadius: 999,
            background: i <= 2 ? 'var(--text-primary)' : 'var(--bg-subtle)',
            transition: 'background 280ms',
          }}/>
        ))}
        <span style={{ fontSize: 13, color: 'var(--text-tertiary)', marginLeft: 8 }}>2 / 4 pomodoros today</span>
      </div>
    </div>
  );
};

const TimerRing = ({ size = 340, progress = 0, timeLeft = 1500 }) => {
  const r = size/2 - 8;
  const c = 2*Math.PI*r;
  const mm = Math.floor(timeLeft / 60);
  const ss = timeLeft % 60;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} stroke="var(--bg-hover)" strokeWidth="3" fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke="var(--text-primary)" strokeWidth="3" fill="none"
          strokeDasharray={c} strokeDashoffset={c * (1 - progress)} strokeLinecap="round"
          style={{ transition: 'stroke-dashoffset 1s linear' }}/>
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontFamily: 'Fraunces', fontSize: 96, fontWeight: 300, letterSpacing: '-0.04em', lineHeight: 1 }}>
          {`${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`}
        </div>
        <div className="label-sm" style={{ marginTop: 8 }}>Focus</div>
      </div>
    </div>
  );
};

              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                <div style={{ flex: 1, width: '100%', display: 'flex', alignItems: 'end' }}>
                  <div style={{
                    width: '100%',
                    height: `${(h/4.5)*100}%`,
                    background: i === 3 ? 'var(--text-primary)' : 'var(--bg-subtle)',
                    borderRadius: '6px 6px 2px 2px',
                    transition: 'height 700ms var(--ease-out-expo)',
                    animation: `growBar 700ms ${i*80}ms var(--ease-out-expo) both`,
                  }}/>
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'Inter', fontWeight: 500 }}>{days[i]}</div>
                <div style={{ fontSize: 11, color: i === 3 ? 'var(--text-primary)' : 'var(--text-tertiary)', fontFamily: 'JetBrains Mono' }}>{h}h</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <h3 className="font-heading" style={{ fontSize: 15, fontWeight: 600, marginBottom: 20 }}>By subject</h3>
          <Donut data={subjects}/>
          <div style={{ marginTop: 20, display: 'flex', flexDirection: 'column', gap: 10 }}>
            {subjects.map(s => (
              <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 13 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: s.color }}/>
                <span style={{ flex: 1, color: 'var(--text-secondary)' }}>{s.name}</span>
                <span style={{ color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono' }}>{s.pct}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="card">
        <h3 className="font-heading" style={{ fontSize: 15, fontWeight: 600, marginBottom: 20 }}>Study calendar · last 22 weeks</h3>
        <StreakCalendar/>
      </div>
    </div>
  );
};

const Donut = ({ data }) => {
  let offset = 0;
  const r = 58, c = 2*Math.PI*r;
  return (
    <div style={{ position: 'relative', width: 160, height: 160, margin: '0 auto' }}>
      <svg width="160" height="160" style={{ transform: 'rotate(-90deg)' }}>
        {data.map((d, i) => {
          const pct = d.pct / 100;
          const dash = c * pct;
          const el = <circle key={i} cx="80" cy="80" r={r} fill="none" stroke={d.color} strokeWidth="14" strokeDasharray={`${dash} ${c}`} strokeDashoffset={-offset * c} style={{ transition: 'stroke-dasharray 600ms var(--ease-out-expo)' }}/>;
          offset += pct;
          return el;
        })}
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div className="font-display" style={{ fontSize: 26, fontWeight: 500 }}>14h</div>
        <div className="label-sm">This week</div>
      </div>
    </div>
  );
};

const StreakCalendar = () => {
  const cells = [];
  for (let w = 0; w < 22; w++) {
    const col = [];
    for (let d = 0; d < 7; d++) {
      const intensity = Math.random();
      let bg;
      if (intensity < 0.25) bg = 'var(--bg-hover)';
      else if (intensity < 0.5) bg = 'rgba(99,102,241,0.20)';
      else if (intensity < 0.75) bg = 'rgba(99,102,241,0.50)';
      else bg = 'var(--brand-500)';
      col.push(<div key={d} style={{ width: 14, height: 14, borderRadius: 3, background: bg, transition: 'transform 160ms', cursor: 'pointer' }}
        onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.3)'}
        onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
      />);
    }
    cells.push(<div key={w} style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>{col}</div>);
  }
  return (
    <div>
      <div style={{ display: 'flex', gap: 3, overflowX: 'auto' }}>{cells}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 14, fontSize: 11, color: 'var(--text-tertiary)' }}>
        <span>Less</span>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: 'var(--bg-hover)' }}/>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: 'rgba(99,102,241,0.20)' }}/>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: 'rgba(99,102,241,0.50)' }}/>
        <div style={{ width: 12, height: 12, borderRadius: 3, background: 'var(--brand-500)' }}/>
        <span>More</span>
      </div>
    </div>
  );
};

window.Productivity = Productivity;

  </script>

      const t = setTimeout(() => setPhase('ready'), 1800);

  const phrases = [

  if (mode === 'ai') {

          </div>

          {/* What could be better */}
          <div className="card" style={{ padding: 24, marginTop: 12 }}>

                <p style={{ fontSize: 14, lineHeight: 1.7, color: 'var(--text-secondary)', marginTop: 18 }}>
                  A hash map stores key-value pairs in buckets indexed by a hash of the key. Average insert, lookup, and delete are O(1); worst-case is O(n) when keys collide and a bucket degenerates into a list. Use a hash map when you need fast lookups by key with no need for ordering — e.g. counting word frequencies, deduping IDs, caching. Prefer an array (or list) when N is small (overhead dominates), when you need ordered iteration, or when keys are dense integers (use the index directly). Tradeoffs: hash maps consume extra memory for the bucket array and store hashes; arrays are denser and more cache-friendly.

    if (!reply.trim()) return;
    setReplies(r => [...r, { user: { name: 'Arjun Patel', handle: 'arjunp', avatar: 'AP', plan: 'Free' }, body: reply, time: 'now', likes: 0 }]);
    setReply('');
  };
  return (
    <div className="slide-in-right" style={{ flex: 1, display: 'flex', flexDirection: 'column', borderLeft: '1px solid var(--border-subtle)', height: '100%', overflow: 'hidden' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '16px 24px', borderBottom: '1px solid var(--border-subtle)' }}>
        <button onClick={onClose} style={{ color: 'var(--text-tertiary)', display: 'flex' }}><Icon name="x" size={18}/></button>
        <span className="font-heading" style={{ fontSize: 16, fontWeight: 600 }}>Thread</span>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        {/* Original post */}
        <div style={{ display: 'flex', gap: 12 }}>
          <Avatar name={post.user.name} size={40}/>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
              <span style={{ fontFamily: 'Inter', fontWeight: 700, fontSize: 14 }}>{post.user.name}</span>
              <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>@{post.user.handle}</span>
              <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>· {post.time}</span>
            </div>
            <p style={{ fontSize: 14, lineHeight: 1.6, color: 'var(--text-primary)' }}>{post.body}</p>
          </div>
        </div>
        <div style={{ height: 1, background: 'var(--border-subtle)' }}/>
        {/* Replies */}
        {replies.map((r, i) => (
          <div key={i} className="fade-in-up" style={{ display: 'flex', gap: 12, paddingLeft: 20, borderLeft: '2px solid var(--border-subtle)' }}>
            <Avatar name={r.user.name} size={32}/>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 4 }}>
                <span style={{ fontFamily: 'Inter', fontWeight: 600, fontSize: 13 }}>{r.user.name}</span>
                <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>@{r.user.handle} · {r.time}</span>
              </div>
              <p style={{ fontSize: 13, lineHeight: 1.5, color: 'var(--text-primary)' }}>{r.body}</p>
              <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 8 }}>
                <button style={{ display: 'flex', alignItems: 'center', gap: 4, color: 'var(--text-tertiary)', fontSize: 12, padding: '4px 6px', borderRadius: 999 }}
                  onMouseEnter={e => e.currentTarget.style.color = 'var(--gold-500)'}
                  onMouseLeave={e => e.currentTarget.style.color = 'var(--text-tertiary)'}
                >
                  <Icon name="star" size={13}/>
                  <span style={{ fontFamily: 'JetBrains Mono', fontSize: 11 }}>{r.likes}</span>
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {/* Reply composer */}
      <div style={{ padding: '14px 24px', borderTop: '1px solid var(--border-subtle)' }}>
        <div style={{ display: 'flex', gap: 10 }}>
          <Avatar name="Arjun Patel" size={32}/>
          <div style={{ flex: 1, background: 'var(--bg-surface)', border: '1px solid var(--border-default)', borderRadius: 14, overflow: 'hidden', transition: 'border-color 200ms' }}
            onFocusCapture={e => e.currentTarget.style.borderColor = 'var(--brand-400)'}
            onBlurCapture={e => e.currentTarget.style.borderColor = 'var(--border-default)'}
          >
            <textarea value={reply} onChange={e => setReply(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && e.metaKey) sendReply(); }}
              placeholder={`Reply to @${post.user.handle}…`}
              style={{ width: '100%', padding: '10px 14px', fontSize: 13, lineHeight: 1.5, resize: 'none', minHeight: 60, background: 'transparent', border: 'none', outline: 'none', color: 'var(--text-primary)' }}/>
            <div style={{ padding: '6px 12px', display: 'flex', justifyContent: 'flex-end' }}>
              <button onClick={sendReply} disabled={!reply.trim()} className="btn btn-brand btn-sm" style={{ opacity: reply.trim() ? 1 : 0.4 }}>Reply</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

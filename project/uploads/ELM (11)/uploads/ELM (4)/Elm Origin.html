<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elm Origin — Learn. Connect. Evolve.</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>

<style>
  html, body { margin: 0; padding: 0; background: var(--bg-base); color: var(--text-primary); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
</style>
<script>
  (function() {
    var saved = localStorage.getItem('elmorigin:theme');
    if (saved === 'dark') document.documentElement.dataset.theme = 'dark';
    var rm = localStorage.getItem('elmorigin:reduce-motion');
    if (rm === 'true') document.documentElement.dataset.reduceMotion = 'true';
  })();
</script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/landing.jsx"></script>
  <script type="text/babel" src="src/home.jsx"></script>
  <script type="text/babel" src="src/mentors.jsx"></script>
  <script type="text/babel" src="src/productivity.jsx"></script>
  <script type="text/babel" src="src/interviews.jsx"></script>
  <script type="text/babel" src="src/misc.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const USER = { name: 'Arjun Patel', plan: 'Pro', streak: 15 };

    function useTheme() {
      const [theme, setTheme] = useState(() => localStorage.getItem('elmorigin:theme') || 'light');
      useEffect(() => {
        document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : '';
        localStorage.setItem('elmorigin:theme', theme);
      }, [theme]);
      return [theme, setTheme];
    }
    window.useTheme = useTheme;

    function App() {
      const [route, setRoute] = useState(() => localStorage.getItem('elmorigin:route') || 'landing');
      const [theme, setTheme] = useTheme();
      const [mentorMode, setMentorMode] = useState(null); // null | 'ai' | 'human'
      const [bookingMentor, setBookingMentor] = useState(null);
      const [searchOpen, setSearchOpen] = useState(false);

      useEffect(() => { localStorage.setItem('elmorigin:route', route); }, [route]);
      useEffect(() => {
        const onKey = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setSearchOpen(true); }
          if (e.key === 'Escape') { setSearchOpen(false); setBookingMentor(null); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const navigate = (id) => { setRoute(id); setMentorMode(null); };

      if (route === 'landing') {
        return <Landing navigate={navigate} theme={theme} setTheme={setTheme}/>;
      }

      const renderMain = () => {
        if (route === 'home') return <Home user={USER} navigate={navigate}/>;
        if (route === 'mentors') {
          if (mentorMode === 'ai') return <NovaChat back={() => setMentorMode(null)}/>;
          if (mentorMode === 'human') return <HumanMentors back={() => setMentorMode(null)} openMentor={setBookingMentor}/>;
          return <MentorsHub openMode={setMentorMode}/>;
        }
        if (route === 'productivity') return <Productivity/>;
        if (route === 'interviews') return <Interviews user={USER}/>;
        if (route === 'community') return <Community/>;
        if (route === 'settings') return <Settings user={USER}/>;
        return null;
      };

      return (
        <div style={{ display: 'flex', minHeight: '100vh', background: 'var(--bg-base)' }}>
          <Sidebar currentRoute={route} navigate={navigate} user={USER}/>
          <main style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
            <TopBar currentRoute={route} mentorMode={mentorMode} openSearch={() => setSearchOpen(true)} theme={theme} setTheme={setTheme}/>
            <div style={{ flex: 1 }}>{renderMain()}</div>
          </main>

          {bookingMentor && <BookingFlow mentor={bookingMentor} close={() => setBookingMentor(null)}/>}
          {searchOpen && <CommandPalette close={() => setSearchOpen(false)} navigate={(r) => { navigate(r); setSearchOpen(false); }}/>}
        </div>
      );
    }

    function CommandPalette({ close, navigate }) {
      const [q, setQ] = useState('');
      const items = [
        { icon: 'home', label: 'Home', route: 'home', kind: 'Go to' },
        { icon: 'mentors', label: 'Mentors', route: 'mentors', kind: 'Go to' },
        { icon: 'productivity', label: 'Productivity', route: 'productivity', kind: 'Go to' },
        { icon: 'interviews', label: 'Interviews', route: 'interviews', kind: 'Go to' },
        { icon: 'community', label: 'Community', route: 'community', kind: 'Go to' },
        { icon: 'settings', label: 'Settings', route: 'settings', kind: 'Go to' },
        { icon: 'sparkles', label: 'Start 25-min focus', kind: 'Action' },
        { icon: 'plus', label: 'New note', kind: 'Action' },
        { icon: 'mentors', label: 'Book a session', kind: 'Action' },
      ];
      const filtered = q ? items.filter(i => i.label.toLowerCase().includes(q.toLowerCase())) : items;

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(14,18,40,0.12)', backdropFilter: 'blur(6px)', zIndex: 300, display: 'flex', justifyContent: 'center', alignItems: 'flex-start', paddingTop: 120 }} onClick={close}>
          <div className="modal-in" style={{ width: 520, background: 'var(--bg-surface)', borderRadius: 18, overflow: 'hidden', boxShadow: 'var(--shadow-xl)', border: '1px solid var(--border-subtle)' }} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 18px', borderBottom: '1px solid var(--border-subtle)' }}>
              <Icon name="search" size={16}/>
              <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder="Search…"
                style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: 'var(--text-primary)', fontSize: 14 }}/>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'var(--text-tertiary)', padding: '3px 6px', border: '1px solid var(--border-default)', borderRadius: 4 }}>ESC</span>
            </div>
            <div style={{ maxHeight: 340, overflowY: 'auto', padding: 6 }}>
              {filtered.length === 0 && <div style={{ padding: 30, textAlign: 'center', color: 'var(--text-tertiary)', fontSize: 13 }}>No results</div>}
              {filtered.map((it, i) => (
                <button key={i} onClick={() => it.route && navigate(it.route)}
                  onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-hover)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                  style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%', padding: '10px 12px', borderRadius: 10, color: 'var(--text-primary)', fontFamily: 'Instrument Sans', fontSize: 14, textAlign: 'left', transition: 'background 140ms' }}>
                  <span style={{ color: 'var(--text-tertiary)' }}><Icon name={it.icon} size={15}/></span>
                  <span style={{ flex: 1 }}>{it.label}</span>
                  <span style={{ fontSize: 10, color: 'var(--text-tertiary)', fontFamily: 'Inter', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{it.kind}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
